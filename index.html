<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Locus Defensus</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { margin: 0; height: 100vh; font-family: 'Inter', Arial, sans-serif; background: linear-gradient(rgba(20, 52, 88, 0.7), rgba(20, 52, 88, 0.8)), url("background.jpg"); background-size: cover; background-position: center; display: flex; justify-content: center; align-items: center; }
        .login-box { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); padding: 40px 30px; border-radius: 20px; width: 90%; max-width: 380px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); text-align: center; border: 1px solid rgba(255, 255, 255, 0.1); color: white; }
        .logo { width: 140px; margin-bottom: 20px; }
        h2 { font-size: 1.1rem; margin-bottom: 25px; font-weight: 500; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: none; outline: none; box-sizing: border-box; font-size: 14px; background: rgba(255, 255, 255, 0.95); text-align: center; color: #333; }
        button { width: 100%; padding: 14px; background: #143458; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 15px; transition: 0.3s; }
        button:hover { background: #1b4a75; }
        .link { margin-top: 15px; color: rgba(255, 255, 255, 0.9); cursor: pointer; font-size: 13px; display: block; text-decoration: none; }
        .link:hover { color: white; text-decoration: underline; }
        .error { color: #ff6b6b; margin-top: 15px; font-size: 13px; display: none; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="login-box">
    <img src="logo.png" class="logo">
    <h2 id="titulo">Acesso ao Protótipo</h2>

    <div id="authFields">
        <input type="text" id="serialNumber" placeholder="Nº de Série (5 dígitos)">
        <input type="email" id="emailUsuario" placeholder="Seu E-mail de Segurança">
    </div>

    <button id="btnPrincipal" onclick="acao()">Entrar no Painel</button>

    <div class="link-container">
        <p class="link" id="toggleLink" onclick="trocarModo()">Novo dispositivo? Registrar</p>
        <p class="link" id="forgotLink" onclick="recuperar()">Esqueci meu e-mail de acesso</p>
    </div>

    <p class="error" id="erro"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyDbsCJu94nErqRYQM67BD9OR9lPVkieR4M",
    authDomain: "coleta-7fecd.firebaseapp.com",
    databaseURL: "https://coleta-7fecd-default-rtdb.firebaseio.com",
    projectId: "coleta-7fecd",
    storageBucket: "coleta-7fecd.firebasestorage.app",
    messagingSenderId: "130929270335",
    appId: "1:130929270335:web:8bcdad7cb048b1ec4fa28a",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

setPersistence(auth, browserLocalPersistence);

let modo = "login";

// TROCAR ENTRE LOGIN E CADASTRO
window.trocarModo = function() {
    modo = (modo === "login") ? "cadastro" : "login";
    document.getElementById("titulo").innerText = (modo === "cadastro") ? "Registar novo Protótipo" : "Acesso ao Protótipo";
    document.getElementById("btnPrincipal").innerText = (modo === "cadastro") ? "Registar e Entrar" : "Entrar no Painel";
    document.getElementById("toggleLink").innerText = (modo === "cadastro") ? "Já tem acesso? Entrar" : "Novo dispositivo? Registrar";
};

// AÇÃO DE ENTRAR / REGISTRAR
window.acao = function() {
    const serial = document.getElementById("serialNumber").value.trim().toLowerCase();
    const email = document.getElementById("emailUsuario").value.trim();
    const erro = document.getElementById("erro");
    
    // O E-MAIL vira a SENHA secreta. O LOGIN vira o SERIAL@locus.com
    const loginFirebase = `${serial}@locus.com`;
    const senhaInvisivel = email; 

    erro.style.display = "none";

    if (!serial || !email) {
        erro.innerText = "Por favor, preencha o Serial e o E-mail.";
        erro.style.display = "block";
        return;
    }

    if (modo === "cadastro") {
        // No cadastro, usamos o e-mail como senha
        createUserWithEmailAndPassword(auth, loginFirebase, senhaInvisivel)
            .then(() => {
                // Salva o vínculo no banco para referência futura
                set(ref(db, 'usuarios/' + serial), { emailDono: email });
                window.location.href = "dashboard.html";
            })
            .catch(e => {
                erro.innerText = "Erro ao registrar: Verifique se o Serial já existe ou se o e-mail é válido.";
                erro.style.display = "block";
            });
    } else {
        // No login, tentamos entrar com o e-mail como senha
        signInWithEmailAndPassword(auth, loginFirebase, senhaInvisivel)
            .then(() => {
                window.location.href = "dashboard.html";
            })
            .catch(() => {
                erro.innerText = "Acesso negado. Verifique o Serial e o E-mail digitado.";
                erro.style.display = "block";
            });
    }
};

// RECUPERAÇÃO (Envia o reset de senha para o e-mail real)
window.recuperar = function() {
    const email = document.getElementById("emailUsuario").value.trim();
    if (!email) {
        alert("Digite o seu e-mail no campo para receber as instruções de recuperação.");
        return;
    }
    
    // Como a senha É o e-mail, se ele quiser trocar a senha via link, 
    // o Firebase enviará para o e-mail real dele.
    sendPasswordResetEmail(auth, email)
        .then(() => alert("Se este e-mail estiver vinculado a um protótipo, você receberá um link de recuperação em breve."))
        .catch(e => alert("Erro ao solicitar: " + e.message));
};
</script>
</body>
</html>
