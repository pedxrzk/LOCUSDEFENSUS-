<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: Arial;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    display: flex;
    justify-content: center;
    align-items: center;
}

.box {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    padding: 25px;
    border-radius: 15px;
    width: 90%;
    max-width: 350px;
    text-align: center;
    color: white;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #00c6ff;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.google {
    background: #db4437;
    margin-top: 10px;
}

.link {
    margin-top: 10px;
    cursor: pointer;
    color: #ddd;
}

.error {
    color: #ff6b6b;
    display: none;
}
</style>
</head>

<body>

<div class="box">

<h2 id="titulo">Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="senha" placeholder="Senha">

<button onclick="acao()">Entrar</button>
<button class="google" onclick="loginGoogle()">Entrar com Google</button>

<p class="link" onclick="trocarModo()" id="toggle">Criar conta</p>
<p class="link" onclick="reset()">Esqueci senha</p>

<p class="error" id="erro"></p>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  sendPasswordResetEmail,
  signInWithPopup,
  GoogleAuthProvider,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDbsCJu94nErqRYQM67BD9OR9lPVkieR4M",
  authDomain: "coleta-7fecd.firebaseapp.com",
  projectId: "coleta-7fecd",
  appId: "1:130929270335:web:8bcdad7cb048b1ec4fa28a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let modo = "login";

// alternar modo
window.trocarModo = () => {
    modo = modo === "login" ? "cadastro" : "login";
    document.getElementById("titulo").innerText =
        modo === "login" ? "Login" : "Cadastro";
    document.getElementById("toggle").innerText =
        modo === "login" ? "Criar conta" : "Já tenho conta";
};

// login / cadastro
window.acao = () => {
    let email = emailInput.value;
    let senha = senhaInput.value;
    let erro = document.getElementById("erro");

    erro.style.display = "none";

    if (!email || !senha) {
        erro.innerText = "Preencha tudo";
        erro.style.display = "block";
        return;
    }

    if (modo === "login") {
        setPersistence(auth, browserLocalPersistence)
        .then(() => signInWithEmailAndPassword(auth, email, senha))
        .then(() => window.location.href = "dashboard.html")
        .catch(e => mostrarErro(e.code));

    } else {
        createUserWithEmailAndPassword(auth, email, senha)
        .then(() => alert("Conta criada!"))
        .catch(e => mostrarErro(e.code));
    }
};

// google
window.loginGoogle = () => {
    setPersistence(auth, browserLocalPersistence)
    .then(() => signInWithPopup(auth, provider))
    .then(() => window.location.href = "dashboard.html")
    .catch(e => mostrarErro(e.message));
};

// reset senha
window.reset = () => {
    let email = emailInput.value;
    if (!email) return alert("Digite o email");

    sendPasswordResetEmail(auth, email)
    .then(() => alert("Email enviado"))
    .catch(e => mostrarErro(e.code));
};

// erros
function mostrarErro(code) {
    let erro = document.getElementById("erro");

    const erros = {
        "auth/user-not-found": "Usuário não encontrado",
        "auth/wrong-password": "Senha errada",
        "auth/email-already-in-use": "Email já usado"
    };

    erro.innerText = erros[code] || code;
    erro.style.display = "block";
}

// inputs
const emailInput = document.getElementById("email");
const senhaInput = document.getElementById("senha");
</script>

</body>
</html>
