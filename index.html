<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Locus Defensus</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Inter', Arial, sans-serif;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url("background.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 30px;
            box-sizing: border-box;
            border-radius: 20px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            width: 140px;
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        h2 {
            color: white;
            font-size: 1.2rem;
            margin-bottom: 20px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 12px;
            border: none;
            outline: none;
            box-sizing: border-box;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.9);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #143458;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button:disabled {
            background: #0d233a;
            cursor: not-allowed;
            opacity: 0.8;
        }

        .google-btn {
            background: #e11d48; /* Tom de vermelho da sua imagem */
            margin-top: 15px;
        }

        /* O Spinner (Círculo de carregamento) */
        .spinner {
            display: none; /* Escondido por padrão */
            margin-right: 10px;
            font-size: 18px;
        }

        .link {
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: block;
        }

        .error {
            color: #ff6b6b;
            margin-top: 15px;
            font-size: 14px;
            display: none;
            background: rgba(0,0,0,0.2);
            padding: 8px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <img src="logo.png" class="logo">
    <h2 id="titulo">Acesse o sistema de monitoramento remoto</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">

    <button id="btnPrincipal" onclick="acao()">
        <i id="loaderIcon" class="fas fa-circle-notch fa-spin spinner"></i>
        <span id="btnText">Entrar</span>
    </button>

    <button class="google-btn" onclick="loginGoogle()">
        Entrar com Google
    </button>

    <p class="link" onclick="esqueciSenha()">Esqueci minha senha</p>
    <p class="link" id="toggleLink" onclick="trocarModo()">Não tem conta? Cadastre-se</p>

    <p class="error" id="erro"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
  sendPasswordResetEmail, signInWithPopup, GoogleAuthProvider,
  setPersistence, browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyDbsCJu94nErqRYQM67BD9OR9lPVkieR4M",
    authDomain: "coleta-7fecd.firebaseapp.com",
    databaseURL: "https://coleta-7fecd-default-rtdb.firebaseio.com",
    projectId: "coleta-7fecd",
    storageBucket: "coleta-7fecd.firebasestorage.app",
    messagingSenderId: "130929270335",
    appId: "1:130929270335:web:8bcdad7cb048b1ec4fa28a",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let modo = "login";

// Função para controlar o estado de carregamento do botão
function setButtonLoading(isLoading) {
    const btn = document.getElementById("btnPrincipal");
    const icon = document.getElementById("loaderIcon");
    const text = document.getElementById("btnText");

    if (isLoading) {
        btn.disabled = true;
        icon.style.display = "inline-block";
        text.innerText = "Aguardando...";
    } else {
        btn.disabled = false;
        icon.style.display = "none";
        text.innerText = modo === "login" ? "Entrar" : "Cadastrar";
    }
}

window.trocarModo = function () {
    let titulo = document.getElementById("titulo");
    let link = document.getElementById("toggleLink");
    let erro = document.getElementById("erro");
    erro.style.display = "none";

    if (modo === "login") {
        modo = "cadastro";
        titulo.innerText = "Cadastro";
        link.innerText = "Já tem conta? Entrar";
    } else {
        modo = "login";
        titulo.innerText = "Acesse o sistema de monitoramento remoto";
        link.innerText = "Não tem conta? Cadastre-se";
    }
    setButtonLoading(false);
};

window.acao = function () {
    let email = document.getElementById("email").value;
    let senha = document.getElementById("senha").value;
    let erro = document.getElementById("erro");

    erro.style.display = "none";

    if (!email || !senha) {
        erro.innerText = "Preencha todos os campos";
        erro.style.display = "block";
        return;
    }

    setButtonLoading(true); // Ativa o spinner e muda o texto

    if (modo === "cadastro") {
        createUserWithEmailAndPassword(auth, email, senha)
            .then(() => {
                alert("Conta criada com sucesso 🚀");
                trocarModo();
            })
            .catch((error) => {
                setButtonLoading(false);
                erro.innerText = traduzirErro(error.code);
                erro.style.display = "block";
            });
    } else {
        setPersistence(auth, browserLocalPersistence)
            .then(() => signInWithEmailAndPassword(auth, email, senha))
            .then(() => {
                window.location.href = "dashboard.html";
            })
            .catch((error) => {
                setButtonLoading(false);
                erro.innerText = traduzirErro(error.code);
                erro.style.display = "block";
            });
    }
};

window.loginGoogle = function () {
    signInWithPopup(auth, provider)
        .then(() => window.location.href = "dashboard.html")
        .catch((error) => alert(error.message));
};

window.esqueciSenha = function () {
    let email = document.getElementById("email").value;
    if (!email) { alert("Digite seu email"); return; }
    sendPasswordResetEmail(auth, email)
        .then(() => alert("Email enviado!"))
        .catch((err) => alert(err.code));
};

function traduzirErro(code) {
    switch (code) {
        case "auth/email-already-in-use": return "E-mail já cadastrado";
        case "auth/invalid-credential": return "E-mail ou senha incorretos";
        case "auth/weak-password": return "Senha muito fraca";
        default: return "Erro ao tentar acessar";
    }
}
</script>
</body>
</html>
