<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Sistema de Monitoramento</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    margin: 0;
    height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url("background.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    padding: 35px 25px;
    border-radius: 20px;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    text-align: center;
}

.logo {
    width: 120px;
    height: 120px;
    object-fit: cover;
    margin-bottom: 15px;
    border-radius: 50%;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
    background: white;
    padding: 10px;
}

h2 {
    color: white;
    font-size: 20px;
    margin-bottom: 25px;
    font-weight: 500;
}

input {
    width: 100%;
    padding: 14px 15px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 15px;
    background: rgba(255,255,255,0.9);
    transition: all 0.3s ease;
}

input:focus {
    background: white;
    box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.3);
}

button {
    width: 100%;
    padding: 12px;
    background: #143458;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    font-size: 16px;
    margin-top: 10px;
    transition: all 0.3s ease;
}

button:hover {
    background: #1e4a76;
    transform: translateY(-2px);
}

.google-btn {
    background: #db4437;
}

.google-btn:hover {
    background: #c5392c;
}

.link {
    margin-top: 15px;
    color: #e0e0e0;
    cursor: pointer;
    font-size: 14px;
}

.link:hover {
    color: white;
    text-decoration: underline;
}

.error {
    color: #ff6b6b;
    margin-top: 15px;
    display: none;
    font-size: 14px;
    background: rgba(0,0,0,0.5);
    padding: 8px;
    border-radius: 8px;
}

.loading {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    border-top-color: white;
    animation: spin 0.6s linear infinite;
    margin-right: 8px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

button:disabled {
    opacity: 0.7;
    cursor: not-allowed;
}
</style>
</head>

<body>

<div class="login-box">
    <img src="logo.png" class="logo" alt="Logo" onerror="this.src='https://via.placeholder.com/120?text=Logo'">
    <h2 id="titulo">Acesse o sistema de monitoramento remoto</h2>

    <input type="email" id="email" placeholder="Email" autocomplete="email">
    <input type="password" id="senha" placeholder="Senha" autocomplete="current-password">

    <button id="btnPrincipal" onclick="acao()">Entrar</button>
    <button class="google-btn" onclick="loginGoogle()">Entrar com Google</button>

    <p class="link" onclick="esqueciSenha()">Esqueci minha senha</p>
    <p class="link" id="toggleLink" onclick="trocarModo()">Não tem conta? Cadastre-se</p>

    <p class="error" id="erro"></p>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from "firebase/app";
    import {
        getAuth,
        signInWithEmailAndPassword,
        createUserWithEmailAndPassword,
        sendPasswordResetEmail,
        signInWithPopup,
        GoogleAuthProvider,
        setPersistence,
        browserLocalPersistence,
        onAuthStateChanged
    } from "firebase/auth";

    const firebaseConfig = {
        apiKey: "AIzaSyDbsCJu94nErqRYQM67BD9OR9lPVkieR4M",
        authDomain: "coleta-7fecd.firebaseapp.com",
        databaseURL: "https://coleta-7fecd-default-rtdb.firebaseio.com",
        projectId: "coleta-7fecd",
        storageBucket: "coleta-7fecd.firebasestorage.app",
        messagingSenderId: "130929270335",
        appId: "1:130929270335:web:8bcdad7cb048b1ec4fa28a",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let modo = "login";
    let isLoading = false;
    let redirecting = false;

    // ⚠️ IMPORTANTE: Só redireciona se NÃO estiver na página de dashboard
    onAuthStateChanged(auth, (user) => {
        if (user && !redirecting) {
            // Verifica se já não está na dashboard
            if (!window.location.pathname.includes("dashboard.html")) {
                redirecting = true;
                console.log("Usuário logado, redirecionando para dashboard...");
                window.location.href = "dashboard.html";
            }
        }
    });

    function setLoading(button, loading) {
        if (loading) {
            button.disabled = true;
            button.innerHTML = '<span class="loading"></span> Aguardando...';
        } else {
            button.disabled = false;
            if (modo === "login") {
                button.innerHTML = "Entrar";
            } else {
                button.innerHTML = "Cadastrar";
            }
        }
        isLoading = loading;
    }

    window.trocarModo = function () {
        if (isLoading) return;
        
        let titulo = document.getElementById("titulo");
        let botao = document.getElementById("btnPrincipal");
        let link = document.getElementById("toggleLink");
        let erro = document.getElementById("erro");

        erro.style.display = "none";

        if (modo === "login") {
            modo = "cadastro";
            titulo.innerText = "Criar nova conta";
            botao.innerHTML = "Cadastrar";
            link.innerText = "Já tem conta? Entrar";
        } else {
            modo = "login";
            titulo.innerText = "Acesse o sistema de monitoramento remoto";
            botao.innerHTML = "Entrar";
            link.innerText = "Não tem conta? Cadastre-se";
        }
    };

    window.acao = function () {
        if (isLoading) return;
        
        let email = document.getElementById("email").value.trim();
        let senha = document.getElementById("senha").value;
        let erro = document.getElementById("erro");
        let botao = document.getElementById("btnPrincipal");

        erro.style.display = "none";

        if (!email || !senha) {
            erro.innerText = "Preencha todos os campos";
            erro.style.display = "block";
            return;
        }

        if (modo === "cadastro") {
            if (senha.length < 6) {
                erro.innerText = "A senha deve ter no mínimo 6 caracteres";
                erro.style.display = "block";
                return;
            }
            
            setLoading(botao, true);
            
            createUserWithEmailAndPassword(auth, email, senha)
                .then(() => {
                    setLoading(botao, false);
                    alert("Conta criada com sucesso! 🚀\nAgora faça login.");
                    document.getElementById("email").value = "";
                    document.getElementById("senha").value = "";
                    if (modo === "cadastro") {
                        trocarModo();
                    }
                })
                .catch((error) => {
                    setLoading(botao, false);
                    erro.innerText = traduzirErro(error.code);
                    erro.style.display = "block";
                });

        } else {
            setLoading(botao, true);
            
            setPersistence(auth, browserLocalPersistence)
                .then(() => {
                    return signInWithEmailAndPassword(auth, email, senha);
                })
                .then(() => {
                    // Login bem sucedido - o onAuthStateChanged vai redirecionar
                    console.log("Login realizado!");
                })
                .catch((error) => {
                    setLoading(botao, false);
                    erro.innerText = traduzirErro(error.code);
                    erro.style.display = "block";
                });
        }
    };

    window.esqueciSenha = function () {
        if (isLoading) return;
        
        let email = document.getElementById("email").value.trim();
        let erro = document.getElementById("erro");

        erro.style.display = "none";

        if (!email) {
            erro.innerText = "Digite seu email primeiro";
            erro.style.display = "block";
            return;
        }

        sendPasswordResetEmail(auth, email)
            .then(() => {
                alert("📧 Email de recuperação enviado!");
            })
            .catch((error) => {
                erro.innerText = traduzirErro(error.code);
                erro.style.display = "block";
            });
    };

    window.loginGoogle = function () {
        if (isLoading) return;
        
        let erro = document.getElementById("erro");
        erro.style.display = "none";
        
        setPersistence(auth, browserLocalPersistence)
            .then(() => {
                return signInWithPopup(auth, provider);
            })
            .then(() => {
                console.log("Login Google realizado!");
            })
            .catch((error) => {
                erro.innerText = traduzirErroGoogle(error.code);
                erro.style.display = "block";
            });
    };

    function traduzirErro(code) {
        const erros = {
            "auth/email-already-in-use": "Este email já está cadastrado",
            "auth/invalid-email": "Email inválido",
            "auth/weak-password": "Senha muito fraca (mínimo 6 caracteres)",
            "auth/user-not-found": "Usuário não encontrado",
            "auth/wrong-password": "Senha incorreta",
            "auth/too-many-requests": "Muitas tentativas. Tente novamente mais tarde",
            "auth/network-request-failed": "Erro de conexão. Verifique sua internet"
        };
        return erros[code] || "Erro: " + code;
    }

    function traduzirErroGoogle(code) {
        if (code === "auth/popup-closed-by-user") {
            return "Popup fechado antes de completar o login";
        }
        if (code === "auth/popup-blocked") {
            return "Popup bloqueado pelo navegador. Permita popups para este site";
        }
        return traduzirErro(code);
    }

    document.getElementById("senha").addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            e.preventDefault();
            acao();
        }
    });
</script>

</body>
</html>
