<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controle - Limno</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
    <div class="spinner-circular"></div>
    <p>Acessando controles...</p>
</div>

<div class="app" id="app" style="display: none;">
    <button class="menu-toggle" id="menuToggle">☰ Menu</button>

    <nav class="sidebar" id="sidebar">
        <div class="logo-card">
            <img src="logo.sidebar.png" class="logo">
        </div>
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="controle.html">⚙️ Controle</a>
        <a href="historico.html">🕒 Histórico</a>
        <a href="quem.html">👥 Quem Somos</a>
        <a href="sobre.html">ℹ️ Sobre</a>
        
        <div class="user-info-group">
            <p id="userSidebar"></p>
            <div class="divider"></div>
            <button id="logoutBtn" class="btn-danger">Sair</button>
        </div>
    </nav>

    <main class="main">
        <header class="topbar">
            <h2>Painel de Controle</h2>
            <p id="userTopbar" style="font-size: 12px; color: #666;"></p>
        </header>
        <div class="cards">
            <div class="card">
                <h3>💡 LED</h3>
                <p id="ledStatus" style="font-size: 24px; font-weight: bold; color: var(--primary);">...</p>
                <button id="btnLed" class="btn-danger" style="margin-top:15px; background: var(--primary-light);">Alternar</button>
            </div>
            <div class="card">
                <h3>🔊 Buzzer</h3>
                <p id="buzzerStatus" style="font-size: 24px; font-weight: bold; color: var(--primary);">...</p>
                <button id="btnBuzzer" class="btn-danger" style="margin-top:15px; background: var(--primary-light);">Alternar</button>
            </div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDbsCJu94nErqRYQM67BD9OR9lPVkieR4M",
        authDomain: "coleta-7fecd.firebaseapp.com",
        databaseURL: "https://coleta-7fecd-default-rtdb.firebaseio.com",
        projectId: "coleta-7fecd",
        storageBucket: "coleta-7fecd.firebasestorage.app",
        messagingSenderId: "130929270335",
        appId: "1:130929270335:web:8bcdad7cb048b1ec4fa28a",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const loader = document.getElementById('loadingOverlay');
    const appEl = document.getElementById('app');
    const sidebar = document.getElementById('sidebar');
    const btnMenu = document.getElementById('menuToggle');

    // Menu Mobile
    if(btnMenu) {
        btnMenu.onclick = (e) => { e.stopPropagation(); sidebar.classList.toggle('active'); };
    }
    document.addEventListener('click', (e) => {
        if (sidebar.classList.contains('active') && !sidebar.contains(e.target) && e.target !== btnMenu) sidebar.classList.remove('active');
    });

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('userSidebar').textContent = user.email;
            document.getElementById('userTopbar').textContent = user.email;
            loader.style.display = 'none';
            appEl.style.display = 'flex';
        } else {
            window.location.replace("index.html");
        }
    });

    // Firebase Realtime
    onValue(ref(db, 'controles/led'), (s) => document.getElementById('ledStatus').textContent = s.val() ? "ON" : "OFF");
    onValue(ref(db, 'controles/buzzer'), (s) => document.getElementById('buzzerStatus').textContent = s.val() ? "ON" : "OFF");

    document.getElementById('btnLed').onclick = () => {
        const status = document.getElementById('ledStatus').textContent === "ON";
        set(ref(db, 'controles/led'), !status);
    };
    document.getElementById('btnBuzzer').onclick = () => {
        const status = document.getElementById('buzzerStatus').textContent === "ON";
        set(ref(db, 'controles/buzzer'), !status);
    };

    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => window.location.replace("index.html"));

// Script para marcar o link ativo automaticamente (Versão Universal)
const currentPath = window.location.pathname; // Pega o caminho completo da URL
const menuLinks = document.querySelectorAll('.sidebar a');

menuLinks.forEach(link => {
    link.classList.remove('active'); // Limpa seleções anteriores
    
    const href = link.getAttribute('href');

    // Verifica se a URL atual contém o nome da página ou se é a raiz (Home)
    if (currentPath.includes(href) || (currentPath === "/" && href === "dashboard.html")) {
        link.classList.add('active');
    }
});

</script>
</body>
</html>
