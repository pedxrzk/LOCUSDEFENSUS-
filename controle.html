<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle - Limno</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
    <div class="spinner-circular"></div>
    <p style="margin-top:15px;">Acessando controles...</p>
</div>

<div class="app" id="app" style="display: none;">
    <nav class="sidebar">
        <div class="logo-card"><img src="logo.sidebar.png" class="logo"></div>
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="controle.html">⚙️ Controle</a>
        <a href="historico.html">🕒 Histórico</a>
        <a href="quem.html">👥 Quem Somos</a>
        <a href="sobre.html">ℹ️ Sobre</a>
        <button id="logoutBtn" class="btn-danger">Sair</button>
    </nav>

    <main class="main">
        <header class="topbar">
            <h2>Painel de Controle</h2>
        </header>
        <div class="cards">
            <div class="card">
                <h3>💡 LED</h3>
                <p id="ledStatus">Carregando...</p>
                <button id="btnLed" style="margin-top:10px; padding:8px; width:100%; cursor:pointer;">Alternar</button>
            </div>
            <div class="card">
                <h3>🔊 Buzzer</h3>
                <p id="buzzerStatus">Carregando...</p>
                <button id="btnBuzzer" style="margin-top:10px; padding:8px; width:100%; cursor:pointer;">Alternar</button>
            </div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { /* MESMA CONFIG DO DASHBOARD */ };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const loader = document.getElementById('loadingOverlay');
    const appEl = document.getElementById('app');

    onAuthStateChanged(auth, (user) => {
        if (user) {
            if(loader) loader.style.display = 'none';
            if(appEl) appEl.style.display = 'flex';
        } else {
            window.location.replace("index.html");
        }
    });

    // Lógica simples do Firebase
    onValue(ref(db, 'controles/led'), (s) => document.getElementById('ledStatus').textContent = s.val() ? "ON" : "OFF");
    onValue(ref(db, 'controles/buzzer'), (s) => document.getElementById('buzzerStatus').textContent = s.val() ? "ON" : "OFF");

    document.getElementById('btnLed').onclick = () => {
        const status = document.getElementById('ledStatus').textContent === "ON";
        set(ref(db, 'controles/led'), !status);
    };
</script>
</body>
</html>
