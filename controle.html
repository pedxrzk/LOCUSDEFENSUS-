<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Controle - Limno</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner-circular"></div>
    <p id="loadingText">Carregando painel de controle...</p>
</div>

<div class="app" id="app" style="display: none;">

    <nav class="sidebar" id="sidebar">
        <div class="logo-card">
            <img src="logo.sidebar.png" alt="Limno Logo" class="logo" onerror="this.style.display='none'">
            <span style="font-size: 24px; font-weight: bold; color: white; display: none;" id="logoFallback">LIMNO</span>
        </div>

        <a href="dashboard.html">📊 Dashboard</a>
        <a href="controle.html" class="active">🎮 Controle</a>
        <a href="historico.html"><i class="fa-solid fa-calendar"></i> Histórico</a>
        <a href="quem.html">👥 Quem Somos</a>
        <a href="sobre.html">ℹ️ Sobre</a>

        <div style="margin-top: 20px; padding: 15px; border-top: 1px solid rgba(255,255,255,0.1);">
            <p style="font-size: 11px; color: rgba(255,255,255,0.6); margin-bottom: 8px; word-break: break-all;" id="userSidebar">
                carregando...
            </p>
            <button class="btn-danger" id="logoutBtn" style="width: 100%;">
                🚪 Sair
            </button>
        </div>
    </nav>

    <div class="overlay" id="overlay"></div>

    <main class="main">

        <header class="topbar">
            <div style="flex: 1; min-width: 0;">
                <h2>Painel de Comandos</h2>
                <p class="user-email" id="userTopbar">carregando...</p>
            </div>
            <button class="menu-btn" id="menuBtn">☰</button>
        </header>

        <div class="cards">
            <article class="card">
                <h3>🔊 Buzzer</h3>
                <p>Teste o alarme sonoro do sistema em tempo real.</p>
                <button onclick="testarBuzzer()" id="btnBuzzer">Testar</button>
            </article>

            <article class="card">
                <h3>💡 LED</h3>
                <p>Ligar ou desligar o indicador luminoso do dispositivo.</p>
                <button onclick="alternarLED()" id="btnLED">Alternar</button>
            </article>
        </div>

    </main>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "firebase/auth";

    const firebaseConfig = {
        apiKey: "AIzaSyDbsCJu94nErqRYQM67BD9OR9lPVkieR4M",
        authDomain: "coleta-7fecd.firebaseapp.com",
        databaseURL: "https://coleta-7fecd-default-rtdb.firebaseio.com",
        projectId: "coleta-7fecd",
        storageBucket: "coleta-7fecd.firebasestorage.app",
        messagingSenderId: "130929270335",
        appId: "1:130929270335:web:8bcdad7cb048b1ec4fa28a",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loadingOverlay = document.getElementById('loadingOverlay');
    const appEl = document.getElementById('app');
    const userTopbar = document.getElementById('userTopbar');
    const userSidebar = document.getElementById('userSidebar');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const menuBtn = document.getElementById('menuBtn');

    // Menu Toggle
    let menuOpen = false;
    function toggleMenu() {
        menuOpen = !menuOpen;
        sidebar.classList.toggle('active', menuOpen);
        overlay.classList.toggle('active', menuOpen);
    }

    menuBtn.onclick = toggleMenu;
    overlay.onclick = toggleMenu;

    // LÓGICA DE AUTENTICAÇÃO E CARREGAMENTO
    let authInitialized = false;

    onAuthStateChanged(auth, (user) => {
        if (!authInitialized) {
            authInitialized = true;
            
            if (user) {
                // Usuário logado
                userTopbar.textContent = user.email;
                userSidebar.textContent = user.email;
                
                // SIMULAÇÃO DO VÍDEO (1.5 segundos de loading)
                setTimeout(() => {
                    loadingOverlay.classList.add('hidden'); // Fade out do loading
                    appEl.style.display = "flex";          // Mostra o app
                }, 1000);

            } else {
                // Não logado, volta pro login
                window.location.replace("index.html");
            }
        }
    });

    // Funções de Botão (Simuladas - Integre com seu Database depois)
    window.testarBuzzer = function() {
        const btn = document.getElementById('btnBuzzer');
        btn.textContent = 'Acionando...';
        btn.disabled = true;
        setTimeout(() => {
            btn.textContent = 'Testar';
            btn.disabled = false;
            alert('Comando enviado ao Buzzer!');
        }, 1000);
    };

    window.alternarLED = function() {
        const btn = document.getElementById('btnLED');
        btn.textContent = 'Processando...';
        btn.disabled = true;
        setTimeout(() => {
            btn.textContent = 'Alternar';
            btn.disabled = false;
            alert('Estado do LED alterado!');
        }, 1000);
    };

    // Logout
    document.getElementById('logoutBtn').onclick = async () => {
        if (confirm('Deseja sair do sistema?')) {
            await signOut(auth);
            window.location.replace("index.html");
        }
    };
</script>

</body>
</html>
