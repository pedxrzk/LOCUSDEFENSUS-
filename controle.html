<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo-card">
            <img src="logo.sidebar.png" alt="Logo" class="logo">
        </div>

        <a href="dashboard.html">Dashboard</a>
        <a href="controle.html" class="active">Controle</a>
        <a href="historico.html">Histórico</a>
        <a href="quem.html">Quem Somos</a>
        <a href="sobre.html">Sobre</a>

        <button class="btn btn-danger mt-20" onclick="logout()">
            Sair
        </button>
    </div>

    <!-- OVERLAY -->
    <div class="overlay" onclick="toggleMenu()"></div>

    <!-- CONTEÚDO -->
    <div class="main">

        <div class="topbar">
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <h2>Painel de Comandos</h2>
            <p id="user"></p>
        </div>

        <div class="cards">

            <div class="card">
                <h3>🔊 Buzzer</h3>
                <p>Teste o alarme sonoro do sistema</p>
                <button onclick="alert('Buzzer acionado')">
                    Testar
                </button>
            </div>

            <div class="card">
                <h3>💡 LED</h3>
                <p>Alternar estado do LED</p>
                <button onclick="alert('LED alternado')">
                    Alternar
                </button>
            </div>

        </div>

    </div>

</div>

<!-- MENU -->
<script>
function toggleMenu() {
    document.querySelector(".sidebar").classList.toggle("active");
    document.querySelector(".overlay").classList.toggle("active");
}

document.querySelectorAll(".sidebar a").forEach(link => {
    link.addEventListener("click", () => {
        document.querySelector(".sidebar").classList.remove("active");
        document.querySelector(".overlay").classList.remove("active");
    });
});
</script>

<!-- 🔥 FIREBASE CORRIGIDO -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "coleta-7fecd.firebaseapp.com",
  projectId: "coleta-7fecd",
  appId: "1:130929270335:web:8bcdad7cb048b1ec4fa28a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔥 ESCONDE TUDO
document.body.style.display = "none";

// 🔥 VERIFICA LOGIN (VERSÃO CERTA)
onAuthStateChanged(auth, (user) => {

  if (user) {
    document.body.style.display = "block";

    const userElement = document.getElementById("user");
    if (userElement) {
      userElement.innerText = "👤 " + user.email;
    }

  } else {
    setTimeout(() => {
      if (!auth.currentUser) {
        window.location.href = "index.html";
      }
    }, 800);
  }

});

// logout
window.logout = function() {
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
};
</script>

</body>
</html>
