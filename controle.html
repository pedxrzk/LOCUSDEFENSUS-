<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Controle - Limno</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

</head>

<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner-circular"></div>
    <p id="loadingText">Acessando painel de controle...</p>
</div>

<div class="app" id="app" style="display: none;">

    <nav class="sidebar" id="sidebar">
    <div class="logo-card">
        <img src="logo.sidebar.png" alt="Limno Logo" class="logo">
    </div>

    <a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
    <a href="controle.html"><i class="fa-solid fa-sliders"></i> Controle</a>
    <a href="historico.html"><i class="fa-solid fa-clock-rotate-left"></i> Histórico</a>
    <a href="quem.html"><i class="fa-solid fa-users"></i> Quem Somos</a>
    <a href="sobre.html"><i class="fa-solid fa-circle-info"></i> Sobre</a>

    <div style="margin-top: 30px; padding: 15px; border-top: 1px solid rgba(255,255,255,0.1);">
    <p style="font-size: 11px; color: rgba(255,255,255,0.6); margin-bottom: 8px; word-break: break-all;" id="userSidebar">
        seu-email@gmail.com
    </p>
    <button class="btn-danger" id="logoutBtn">
        <i class="fa-solid fa-right-from-bracket"></i> Sair
    </button>
</div>
</nav>

    <div class="overlay" id="overlay"></div>

    <main class="main">

        <header class="topbar">
            <div style="flex: 1; min-width: 0;">
                <h2>Painel de Controle</h2>
                <p class="user-email" id="userTopbar">carregando...</p>
            </div>
            <button class="menu-btn" id="menuBtn">☰</button>
        </header>

        <div class="cards">
            <article class="card">
                <h3>💡 Status do LED</h3>
                <p id="ledStatus">Carregando...</p>
                <button class="btn-primary" id="btnLed" style="margin-top: 15px; width: 100%; padding: 10px; border-radius: 8px; cursor: pointer;">
                    Alternar LED
                </button>
            </article>

            <article class="card">
                <h3>🔊 Status do Buzzer</h3>
                <p id="buzzerStatus">Carregando...</p>
                <button class="btn-primary" id="btnBuzzer" style="margin-top: 15px; width: 100%; padding: 10px; border-radius: 8px; cursor: pointer;">
                    Alternar Buzzer
                </button>
            </article>
        </div>

    </main>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "firebase/auth";
    import { getDatabase, ref, onValue, set } from "firebase/database";

    const firebaseConfig = {
        apiKey: "AIzaSyDbsCJu94nErqRYQM67BD9OR9lPVkieR4M",
        authDomain: "coleta-7fecd.firebaseapp.com",
        databaseURL: "https://coleta-7fecd-default-rtdb.firebaseio.com",
        projectId: "coleta-7fecd",
        storageBucket: "coleta-7fecd.firebasestorage.app",
        messagingSenderId: "130929270335",
        appId: "1:130929270335:web:8bcdad7cb048b1ec4fa28a",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    setPersistence(auth, browserLocalPersistence);

    const loadingOverlay = document.getElementById('loadingOverlay');
    const appEl = document.getElementById('app');
    const userTopbar = document.getElementById('userTopbar');
    const userSidebar = document.getElementById('userSidebar');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const menuBtn = document.getElementById('menuBtn');

    // Menu Toggle
    let menuOpen = false;
    function toggleMenu() {
        menuOpen = !menuOpen;
        sidebar.classList.toggle('active', menuOpen);
        overlay.classList.toggle('active', menuOpen);
    }
    menuBtn.onclick = toggleMenu;
    overlay.onclick = toggleMenu;

    // Monitor de Autenticação com carregamento de 0.5s
    let authInitialized = false;
    onAuthStateChanged(auth, (user) => {
        if (!authInitialized) {
            authInitialized = true;
            if (user) {
                userTopbar.textContent = user.email;
                userSidebar.textContent = user.email;
                
                setTimeout(() => {
                    loadingOverlay.classList.add('hidden');
                    appEl.style.display = "flex";
                }, 500); // Meio segundo conforme solicitado

            } else {
                window.location.replace("index.html");
            }
        }
    });

    // Lógica de Controle em Tempo Real (Firebase)
    const ledRef = ref(db, 'controles/led');
    const buzzerRef = ref(db, 'controles/buzzer');

    onValue(ledRef, (snapshot) => {
        const estado = snapshot.val();
        document.getElementById('ledStatus').textContent = estado ? "Ligado" : "Desligado";
        document.getElementById('ledStatus').style.color = estado ? "#2ecc71" : "#e74c3c";
    });

    onValue(buzzerRef, (snapshot) => {
        const estado = snapshot.val();
        document.getElementById('buzzerStatus').textContent = estado ? "Ligado" : "Desligado";
        document.getElementById('buzzerStatus').style.color = estado ? "#2ecc71" : "#e74c3c";
    });

    document.getElementById('btnLed').onclick = () => {
        const current = document.getElementById('ledStatus').textContent === "Ligado";
        set(ledRef, !current);
    };

    document.getElementById('btnBuzzer').onclick = () => {
        const current = document.getElementById('buzzerStatus').textContent === "Ligado";
        set(buzzerRef, !current);
    };

    // Logout
    document.getElementById('logoutBtn').onclick = async () => {
        if (confirm('Deseja sair do painel de controle?')) {
            await signOut(auth);
            window.location.replace("index.html");
        }
    };
</script>

</body>
</html>
