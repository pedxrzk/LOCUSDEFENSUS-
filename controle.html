<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controle - Locus Defensus</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        /* Padronização dos botões conforme seu design */
        .btn-controle {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            background: #143458;
            transition: 0.2s;
            text-transform: uppercase;
        }
        .btn-controle:active {
            transform: scale(0.95);
            background: #1b4a75;
        }
        
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            margin-top: 10px;
            font-weight: bold;
        }
        .bg-alerta { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; }
        .bg-seguro { background: rgba(74, 227, 181, 0.2); color: #4ae3b5; }
    </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
    <div class="spinner-circular"></div>
    <p>Acessando controles do protótipo...</p>
</div>

<div class="app" id="app" style="display: none;">
    <button class="menu-toggle" id="menuToggle">☰ Menu</button>

    <nav class="sidebar" id="sidebar">
        <div class="logo-card"><img src="logo.sidebar.png" class="logo"></div>
        <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="controle.html" class="active"><i class="fas fa-sliders"></i> Controle</a>
        <a href="historico.html"><i class="fas fa-clock-rotate-left"></i> Histórico</a>
        <a href="quem.html"><i class="fas fa-users"></i> Quem Somos</a>
        <a href="sobre.html"><i class="fas fa-circle-info"></i> Sobre</a>
        <div class="user-info-group">
            <p id="userSidebar" style="font-weight: bold; color: white;"></p>
            <div class="divider"></div>
            <button id="logoutBtn" class="btn-danger">Sair</button>
        </div>
    </nav>

    <main class="main">
        <header class="topbar">
            <h2 id="tituloPagina">Painel de Controle</h2>
            <p id="userTopbar" style="font-size: 12px; color: #666;"></p>
        </header>

        <div class="cards">
            <div class="card">
                <h3>🌀 VENTOINHA</h3>
                <p id="fanStatus" style="font-size: 24px; font-weight: bold; color: #666;">AGUARDANDO...</p>
                <button id="btnFan" class="btn-controle">Alternar Ventoinha</button>
            </div>

            <div class="card">
                <h3>🔊 BUZZER (ALERTA)</h3>
                <p id="buzzerStatus" style="font-size: 24px; font-weight: bold; color: #666;">AGUARDANDO...</p>
                <button id="btnBuzzer" class="btn-controle">Alternar Alerta</button>
            </div>

            <div class="card">
                <h3>🚪 STATUS DA PORTA</h3>
                <div id="doorBadge" class="status-badge">CARREGANDO...</div>
                <p style="font-size: 12px; color: #999; margin-top: 10px;">Verifique o estado antes de agir.</p>
            </div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDbsCJu94nErqRYQM67BD9OR9lPVkieR4M",
        authDomain: "coleta-7fecd.firebaseapp.com",
        databaseURL: "https://coleta-7fecd-default-rtdb.firebaseio.com",
        projectId: "coleta-7fecd",
        storageBucket: "coleta-7fecd.firebasestorage.app",
        messagingSenderId: "130929270335",
        appId: "1:130929270335:web:8bcdad7cb048b1ec4fa28a",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const loader = document.getElementById('loadingOverlay');
    const appEl = document.getElementById('app');
    const sidebar = document.getElementById('sidebar');
    const btnMenu = document.getElementById('menuToggle');

    let serialLogado = "";

    // 1. Gerenciamento de Login e Formatação do ID (Onde estava a diferença)
    onAuthStateChanged(auth, (user) => {
        if (user) {
            // Extrai apenas o ID (ex: 00001) para manter o visual limpo do Histórico
            serialLogado = user.email.split('@')[0];
            
            // Define o texto exatamente como você quer (ex: Protótipo: 00001)
            const idTexto = "Protótipo: " + serialLogado.toUpperCase();
            
            document.getElementById('userSidebar').textContent = idTexto;
            document.getElementById('userTopbar').textContent = idTexto;
            document.getElementById('tituloPagina').textContent = "Controle - " + serialLogado;

            vincularAosDados(serialLogado);
            forceShow();
        } else {
            window.location.replace("index.html");
        }
    });

    // 2. Sincronização com Firebase
    function vincularAosDados(serial) {
        const caminhoRef = ref(db, 'prototipos/' + serial);

        onValue(caminhoRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // Status Ventoinha
                const fanEl = document.getElementById('fanStatus');
                fanEl.textContent = data.ventoinha ? "LIGADA" : "DESLIGADA";
                fanEl.style.color = data.ventoinha ? "#4ae3b5" : "#ff6b6b";

                // Status Buzzer
                const buzEl = document.getElementById('buzzerStatus');
                buzEl.textContent = data.buzzer ? "ATIVO" : "INATIVO";
                buzEl.style.color = data.buzzer ? "#4ae3b5" : "#ff6b6b";

                // Status Porta
                const portaAberta = data.porta === true || data.porta === "aberta";
                const badge = document.getElementById('doorBadge');
                badge.textContent = portaAberta ? "PORTA ABERTA" : "PORTA FECHADA";
                badge.className = "status-badge " + (portaAberta ? "bg-alerta" : "bg-seguro");
            }
        });
    }

    // 3. Ações de Clique
    document.getElementById('btnFan').onclick = () => {
        const atual = document.getElementById('fanStatus').textContent === "LIGADA";
        set(ref(db, `prototipos/${serialLogado}/ventoinha`), !atual);
    };

    document.getElementById('btnBuzzer').onclick = () => {
        const atual = document.getElementById('buzzerStatus').textContent === "ATIVO";
        set(ref(db, `prototipos/${serialLogado}/buzzer`), !atual);
    };

    function forceShow() {
        if(loader) loader.style.display = 'none';
        if(appEl) appEl.style.display = 'flex';
    }

    // 4. Menu e Sidebar (Correção para fechar ao clicar fora)
    if(btnMenu) {
        btnMenu.onclick = (e) => {
            e.stopPropagation();
            sidebar.classList.toggle('active');
        };
    }

    document.addEventListener('click', (e) => {
        if (sidebar.classList.contains('active') && !sidebar.contains(e.target) && e.target !== btnMenu) {
            sidebar.classList.remove('active');
        }
    });

    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => window.location.replace("index.html"));

</script>
</body>
</html>
