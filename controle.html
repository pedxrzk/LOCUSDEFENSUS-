<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOADING -->
<div class="loading" id="loading" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 20px;">
    <div class="spinner" style="width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <p>Carregando...</p>
</div>

<style>
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>

<div class="app" style="display: none;" id="app">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo-card">
            <img src="logo.sidebar.png" alt="Logo" class="logo">
        </div>

        <a href="dashboard.html">Dashboard</a>
        <a href="controle.html" class="active">Controle</a>
        <a href="historico.html">Histórico</a>
        <a href="quem.html">Quem Somos</a>
        <a href="sobre.html">Sobre</a>

        <button class="btn btn-danger mt-20" id="logoutBtn">
            Sair
        </button>
    </div>

    <!-- OVERLAY -->
    <div class="overlay" onclick="toggleMenu()"></div>

    <!-- CONTEÚDO -->
    <div class="main">

        <div class="topbar">
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <h2>Painel de Comandos</h2>
            <p id="user"></p>
        </div>

        <div class="cards">

            <div class="card">
                <h3>🔊 Buzzer</h3>
                <p>Teste o alarme sonoro do sistema</p>
                <button onclick="testarBuzzer()" id="btnBuzzer">
                    Testar
                </button>
            </div>

            <div class="card">
                <h3>💡 LED</h3>
                <p>Alternar estado do LED</p>
                <button onclick="alternarLED()" id="btnLED">
                    Alternar
                </button>
            </div>

        </div>

    </div>

</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, onAuthStateChanged, signOut } from "firebase/auth";

    // Firebase Config - COMPLETA
    const firebaseConfig = {
        apiKey: "AIzaSyDbsCJu94nErqRYQM67BD9OR9lPVkieR4M",
        authDomain: "coleta-7fecd.firebaseapp.com",
        databaseURL: "https://coleta-7fecd-default-rtdb.firebaseio.com",
        projectId: "coleta-7fecd",
        storageBucket: "coleta-7fecd.firebasestorage.app",
        messagingSenderId: "130929270335",
        appId: "1:130929270335:web:8bcdad7cb048b1ec4fa28a",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loadingEl = document.getElementById('loading');
    const appEl = document.getElementById('app');
    const userEl = document.getElementById('user');
    const logoutBtn = document.getElementById('logoutBtn');

    // Função toggleMenu (global)
    window.toggleMenu = function() {
        const sidebar = document.querySelector(".sidebar");
        const overlay = document.querySelector(".overlay");
        if (sidebar && overlay) {
            sidebar.classList.toggle("active");
            overlay.classList.toggle("active");
        }
    };

    // Fechar menu ao clicar nos links (mobile)
    document.querySelectorAll(".sidebar a").forEach(link => {
        link.addEventListener("click", () => {
            const sidebar = document.querySelector(".sidebar");
            const overlay = document.querySelector(".overlay");
            if (window.innerWidth <= 768) {
                if (sidebar) sidebar.classList.remove("active");
                if (overlay) overlay.classList.remove("active");
            }
        });
    });

    // Funções de controle
    window.testarBuzzer = function() {
        const btn = document.getElementById('btnBuzzer');
        const textoOriginal = btn.innerHTML;
        btn.innerHTML = '🔊 Acionando...';
        btn.disabled = true;
        
        // Simular acionamento (substitua por chamada real ao Arduino/API)
        setTimeout(() => {
            alert('🔊 Buzzer acionado!');
            btn.innerHTML = textoOriginal;
            btn.disabled = false;
        }, 500);
    };

    window.alternarLED = function() {
        const btn = document.getElementById('btnLED');
        const textoOriginal = btn.innerHTML;
        btn.innerHTML = '💡 Alternando...';
        btn.disabled = true;
        
        // Simular alternância (substitua por chamada real ao Arduino/API)
        setTimeout(() => {
            alert('💡 Estado do LED alternado!');
            btn.innerHTML = textoOriginal;
            btn.disabled = false;
        }, 500);
    };

    // Logout
    window.logout = async function() {
        try {
            await signOut(auth);
            window.location.href = "index.html";
        } catch (error) {
            console.error("Erro ao sair:", error);
            alert("Erro ao sair. Tente novamente.");
        }
    };

    if (logoutBtn) {
        logoutBtn.onclick = window.logout;
    }

    // ✅ VERIFICAÇÃO DE AUTENTICAÇÃO
    onAuthStateChanged(auth, (user) => {
        console.log("Controle - Auth:", user ? user.email : "Não logado");
        
        if (user) {
            // Usuário logado - mostra a página
            if (userEl) {
                userEl.innerText = "👤 " + user.email;
            }
            
            // Esconde loading e mostra app
            if (loadingEl) loadingEl.style.display = "none";
            if (appEl) appEl.style.display = "block";
            
        } else {
            // Usuário NÃO logado - redireciona para login
            console.log("Usuário não autenticado, redirecionando para login...");
            window.location.replace("index.html");
        }
    });
</script>

</body>
</html>
