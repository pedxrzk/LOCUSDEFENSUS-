<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sobre</title>
<link rel="stylesheet" href="style.css">
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "coleta-7fecd.firebaseapp.com",
  projectId: "coleta-7fecd",
  appId: "1:130929270335:web:8bcdad7cb048b1ec4fa28a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔥 CORREÇÃO AQUI
let carregou = false;

onAuthStateChanged(auth, (user) => {
  if (!carregou) {
    carregou = true;

    if (user) {
      document.getElementById("user").innerText = "👤 " + user.email;
    } else {
      window.location.href = "login.html";
    }
  }
});

// 🚪 logout
window.logout = function() {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
};
</script>

<body>

<div class="app">

    <!-- SIDEBAR -->
<div class="sidebar">
   
    <div class="logo-card">
        <img src="logo.sidebar.png" alt="Logo" class="logo">
    </div>

    <a href="dashboard.html">Dashboard</a>
    <a href="controle.html">Controle</a>
    <a href="historico.html">Histórico</a>
    <a href="quem.html">Quem Somos</a>
    <a href="sobre.html" class="active">Sobre</a>

    <button class="btn btn-danger mt-20" onclick="logout()">
        Sair
    </button>

</div>

<!-- OVERLAY (fora da sidebar) -->
<div class="overlay" onclick="toggleMenu()"></div>

    <!-- CONTEÚDO -->
    <div class="main">

    <div class="topbar">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <h2>Sobre o Projeto</h2>
    </div>

    <div class="cards">

        <div class="card">
            <h3>📡 Sistema IoT</h3>
            <p>Monitoramento remoto com ESP32 e sensores em tempo real.</p>
        </div>

        <div class="card">
            <h3>⚙️ Tecnologias</h3>
            <p>HTML, CSS, JavaScript e Firebase.</p>
        </div>

        <div class="card">
            <h3>🔐 Objetivo</h3>
            <p>Controle e visualização de dados ambientais com segurança.</p>
        </div>

    </div>

</div>
<script>
function toggleMenu() {
    document.querySelector(".sidebar").classList.toggle("active");
    document.querySelector(".overlay").classList.toggle("active");
  document.querySelectorAll(".sidebar a").forEach(link => {
    link.addEventListener("click", () => {
        document.querySelector(".sidebar").classList.remove("active");
        document.querySelector(".overlay").classList.remove("active");
    });
});
}
</script>
</body>
</html>
