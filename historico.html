<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Histórico - Locus Defensus</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        .card-historico {
            border-left: 5px solid #143458;
            margin-bottom: 12px;
            padding: 15px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            animation: fadeIn 0.4s ease;
        }
        .card-historico.aberta { border-left-color: #ff6b6b; }
        .card-historico.fechada { border-left-color: #4ae3b5; }
        
        .card-historico h3 { font-size: 13px; color: #888; margin: 0; }
        .card-historico p { font-size: 16px; font-weight: bold; margin: 5px 0; color: #143458; }
        
        /* Grid para as informações ambientais */
        .info-extras {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }
        .info-item {
            display: flex;
            flex-direction: column;
            font-size: 12px;
            color: #555;
            text-align: center;
        }
        .info-item i { margin-bottom: 3px; color: #143458; }
        .info-item span { font-weight: bold; color: #333; }

        .card-historico small { color: #aaa; display: block; margin-top: 8px; font-size: 11px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
    <div class="spinner-circular"></div>
    <p>Sincronizando registros...</p>
</div>

<div class="app" id="app" style="display: none;">
    <button class="menu-toggle" id="menuToggle">☰ Menu</button>

    <nav class="sidebar" id="sidebar">
        <div class="logo-card"><img src="logo.sidebar.png" class="logo"></div>
        <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="controle.html"><i class="fas fa-sliders"></i> Controle</a>
        <a href="historico.html" class="active"><i class="fas fa-clock-rotate-left"></i> Histórico</a>
        <a href="quem.html"><i class="fas fa-users"></i> Quem Somos</a>
        <a href="sobre.html"><i class="fas fa-circle-info"></i> Sobre</a>
        <div class="user-info-group">
            <p id="userSidebar" style="font-weight: bold; color: white; font-size: 14px;"></p>
            <div class="divider"></div>
            <button id="logoutBtn" class="btn-danger">Sair</button>
        </div>
    </nav>

    <main class="main">
        <header class="topbar">
            <h2>Registros de Acesso</h2>
            <p id="userTopbar" style="font-size: 11px; color: #888;"></p>
        </header>

        <div class="cards" id="historicoCards">
             <p style='text-align:center; color:#999; padding: 40px;'>Conectando ao sistema...</p>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, push, serverTimestamp, query, limitToLast, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDbsCJu94nErqRYQM67BD9OR9lPVkieR4M",
        authDomain: "coleta-7fecd.firebaseapp.com",
        databaseURL: "https://coleta-7fecd-default-rtdb.firebaseio.com",
        projectId: "coleta-7fecd",
        storageBucket: "coleta-7fecd.firebasestorage.app",
        messagingSenderId: "130929270335",
        appId: "1:130929270335:web:8bcdad7cb048b1ec4fa28a",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const container = document.getElementById('historicoCards');
    let ultimaPortaStatus = null; 

    onAuthStateChanged(auth, (user) => {
        if (user) {
            const serialLogado = user.email.split('@')[0];
            const label = "Protótipo SN: " + serialLogado.toUpperCase();
            document.getElementById('userSidebar').textContent = label;
            document.getElementById('userTopbar').textContent = label;
            
            ativarLogsReais(serialLogado);
            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
        } else {
            window.location.replace("index.html");
        }
    });

    async function ativarLogsReais(serial) {
        const rootRef = ref(db, `prototipos/${serial}`);
        const portaRef = ref(db, `prototipos/${serial}/porta`);
        const logsRef = ref(db, `prototipos/${serial}/logs_acesso`);

        // ESCUTA A MUDANÇA DA PORTA E BUSCA DADOS AMBIENTAIS
        onValue(portaRef, async (snapshot) => {
            const val = snapshot.val();
            const statusAtual = (val === true || val === "aberta") ? "aberta" : "fechada";
            
            if (ultimaPortaStatus !== null && ultimaPortaStatus !== statusAtual) {
                // LER OS DADOS DE TEMPERATURA/UMIDADE/PRESSÃO ANTES DE SALVAR O LOG
                const snapshotDados = await get(rootRef);
                const dadosAtuais = snapshotDados.val();

                const agora = new Date();
                push(logsRef, {
                    tipo: statusAtual,
                    data: agora.toLocaleDateString('pt-BR'),
                    hora: agora.toLocaleTimeString('pt-BR'),
                    // Pega as chaves exatas do seu Firebase: temperatura, umidade, pressao
                    temp: dadosAtuais.temperatura || 0,
                    umid: dadosAtuais.umidade || 0,
                    pres: dadosAtuais.pressao || 0,
                    timestamp: serverTimestamp()
                });
            }
            ultimaPortaStatus = statusAtual;
        });

        // EXIBE OS LOGS NA TELA
        const consultaLogs = query(logsRef, limitToLast(30));
        onValue(consultaLogs, (snapshot) => {
            container.innerHTML = "";
            const data = snapshot.val();
            
            if (data) {
                Object.values(data).reverse().forEach(log => {
                    renderizarCard(log);
                });
            } else {
                container.innerHTML = "<p style='text-align:center; color:#999; padding: 40px;'>Nenhum log gerado ainda.</p>";
            }
        });
    }

    function renderizarCard(item) {
        const article = document.createElement('article');
        article.className = `card card-historico ${item.tipo}`;
        const icone = item.tipo === 'aberta' ? 'fa-door-open' : 'fa-door-closed';
        const texto = item.tipo === 'aberta' ? 'PORTA FOI ABERTA' : 'PORTA FOI FECHADA';

        article.innerHTML = `
            <h3>${item.data}</h3>
            <p><i class="fas ${icone}"></i> ${texto}</p>
            
            <div class="info-extras">
                <div class="info-item">
                    <i class="fas fa-thermometer-half"></i>
                    <span>${item.temp}°C</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-droplet"></i>
                    <span>${item.umid}%</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-gauge-high"></i>
                    <span>${item.pres} hPa</span>
                </div>
            </div>
            
            <small><i class="fas fa-clock"></i> Registro: ${item.hora}</small>
        `;
        container.appendChild(article);
    }

    // Sidebar & Menu
    document.getElementById('menuToggle').onclick = (e) => { 
        e.stopPropagation(); 
        document.getElementById('sidebar').classList.toggle('active'); 
    };
    
    document.addEventListener('click', (e) => { 
        if (!document.getElementById('sidebar').contains(e.target)) {
            document.getElementById('sidebar').classList.remove('active'); 
        }
    });

    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => window.location.replace("index.html"));
</script>
</body>
</html>
