<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico - Limno</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner-circular"></div>
    <p>Carregando histórico...</p>
</div>

<div class="app" id="app" style="display: none;">
    <nav class="sidebar">
        <div class="logo-card"><img src="logo.sidebar.png" class="logo"></div>
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="controle.html">⚙️ Controle</a>
        <a href="historico.html">🕒 Histórico</a>
        <a href="quem.html">👥 Quem Somos</a>
        <a href="sobre.html">ℹ️ Sobre</a>
        <div style="margin-top: auto; padding: 15px;">
            <p id="userSidebar" style="font-size: 10px; color: #ccc; margin-bottom: 8px;"></p>
            <button class="btn-danger" id="logoutBtn">Sair</button>
        </div>
    </nav>

    <main class="main">
        <header class="topbar">
            <h2>Histórico de Dados</h2>
            <p id="userTopbar" class="user-email"></p>
        </header>
        <div class="cards" id="historicoCards">
            <article class="card"><h3>25/03/2026</h3><p>Temp: 26.5°C</p><small>14:32</small></article>
            <article class="card"><h3>25/03/2026</h3><p>Temp: 25.8°C</p><small>10:15</small></article>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDbsCJu94nErqRYQM67BD9OR9lPVkieR4M",
        authDomain: "coleta-7fecd.firebaseapp.com",
        databaseURL: "https://coleta-7fecd-default-rtdb.firebaseio.com",
        projectId: "coleta-7fecd",
        storageBucket: "coleta-7fecd.firebasestorage.app",
        messagingSenderId: "130929270335",
        appId: "1:130929270335:web:8bcdad7cb048b1ec4fa28a",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loader = document.getElementById('loadingOverlay');
    const appDiv = document.getElementById('app');

    // Segurança: Destrava em 2s
    setTimeout(() => {
        if(loader) loader.style.display = 'none';
        if(appDiv) appDiv.style.display = 'flex';
    }, 2000);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            const u1 = document.getElementById('userTopbar');
            const u2 = document.getElementById('userSidebar');
            if(u1) u1.textContent = user.email;
            if(u2) u2.textContent = user.email;
            if(loader) loader.style.display = 'none';
            if(appDiv) appDiv.style.display = 'flex';
        } else {
            window.location.replace("index.html");
        }
    });

    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => window.location.replace("index.html"));
</script>
</body>
</html>
