<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Histórico - Locus Defensus</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        .card-historico {
            border-left: 5px solid #143458;
            margin-bottom: 12px;
            padding: 15px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            animation: fadeIn 0.4s ease;
        }
        /* Cores baseadas no evento contido no texto */
        .card-historico.aberta { border-left-color: #ff6b6b; }
        .card-historico.fechada { border-left-color: #4ae3b5; }
        
        .card-historico h3 { font-size: 13px; color: #888; margin: 0; }
        .card-historico p { font-size: 16px; font-weight: bold; margin: 5px 0; color: #143458; }
        
        .info-extras {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }
        .info-item {
            display: flex;
            flex-direction: column;
            font-size: 12px;
            color: #555;
            text-align: center;
        }
        .info-item i { margin-bottom: 3px; color: #143458; }
        .info-item span { font-weight: bold; color: #333; }

        .card-historico small { color: #aaa; display: block; margin-top: 8px; font-size: 11px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
    <div class="spinner-circular"></div>
    <p>Sincronizando registros...</p>
</div>

<div class="app" id="app" style="display: none;">
    <button class="menu-toggle" id="menuToggle">☰ Menu</button>

    <nav class="sidebar" id="sidebar">
        <div class="logo-card"><img src="logo.sidebar.png" class="logo"></div>
        <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="controle.html"><i class="fas fa-sliders"></i> Controle</a>
        <a href="historico.html" class="active"><i class="fas fa-clock-rotate-left"></i> Histórico</a>
        <a href="quem.html"><i class="fas fa-users"></i> Quem Somos</a>
        <a href="sobre.html"><i class="fas fa-circle-info"></i> Sobre</a>
        <div class="user-info-group">
            <p id="userSidebar" style="font-weight: bold; color: white; font-size: 14px;"></p>
            <div class="divider"></div>
            <button id="logoutBtn" class="btn-danger">Sair</button>
        </div>
    </nav>

    <main class="main">
        <header class="topbar">
            <h2>Registros de Acesso</h2>
            <p id="userTopbar" style="font-size: 11px; color: #888;"></p>
        </header>

        <div class="cards" id="historicoCards">
             <p style='text-align:center; color:#999; padding: 40px;'>Conectando ao sistema...</p>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDbsCJu94nErqRYQM67BD9OR9lPVkieR4M",
        authDomain: "coleta-7fecd.firebaseapp.com",
        databaseURL: "https://coleta-7fecd-default-rtdb.firebaseio.com",
        projectId: "coleta-7fecd",
        storageBucket: "coleta-7fecd.firebasestorage.app",
        messagingSenderId: "130929270335",
        appId: "1:130929270335:web:8bcdad7cb048b1ec4fa28a",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const container = document.getElementById('historicoCards');

    onAuthStateChanged(auth, (user) => {
        if (user) {
            const serialLogado = user.email.split('@')[0];
            const label = "Protótipo: " + serialLogado.toUpperCase();
            document.getElementById('userSidebar').textContent = label;
            document.getElementById('userTopbar').textContent = label;
            
            // Inicia a escuta dos logs salvos pelo Dashboard
            carregarHistorico(serialLogado);
            
            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
        } else {
            window.location.replace("index.html");
        }
    });

    function carregarHistorico(serial) {
        // Referência exata de onde o Dashboard salva os dados
        const logsRef = ref(db, `historico/${serial}`);

        // Busca os últimos 50 registros em tempo real
        const consultaLogs = query(logsRef, limitToLast(50));
        
        onValue(consultaLogs, (snapshot) => {
            container.innerHTML = "";
            const data = snapshot.val();
            
            if (data) {
                // Inverte a ordem para que o mais recente apareça primeiro
                const registros = Object.values(data).reverse();
                registros.forEach(log => {
                    renderizarCard(log);
                });
            } else {
                container.innerHTML = "<p style='text-align:center; color:#999; padding: 40px;'>Nenhum registro encontrado no histórico.</p>";
            }
        });
    }

    function renderizarCard(item) {
        // Detecta se foi aberta ou fechada para aplicar a cor correta
        const isAberta = item.evento.includes("ABERTA");
        const classeTipo = isAberta ? 'aberta' : 'fechada';
        const iconePorta = isAberta ? 'fa-door-open' : 'fa-door-closed';

        const article = document.createElement('article');
        article.className = `card-historico ${classeTipo}`;

        article.innerHTML = `
            <h3>${item.data}</h3>
            <p><i class="fas ${iconePorta}"></i> ${item.evento}</p>
            
            <div class="info-extras">
                <div class="info-item">
                    <i class="fas fa-thermometer-half"></i>
                    <span>${item.temperatura || '--'}</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-droplet"></i>
                    <span>${item.umidade || '--'}</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-gauge-high"></i>
                    <span>${item.pressao || '--'}</span>
                </div>
            </div>
            
            <small><i class="fas fa-clock"></i> Horário do Evento: ${item.hora}</small>
        `;
        container.appendChild(article);
    }

    // Interatividade da Sidebar
    document.getElementById('menuToggle').onclick = (e) => { 
        e.stopPropagation(); 
        document.getElementById('sidebar').classList.toggle('active'); 
    };
    
    document.addEventListener('click', (e) => { 
        const sidebar = document.getElementById('sidebar');
        if (sidebar.classList.contains('active') && !sidebar.contains(e.target)) {
            sidebar.classList.remove('active'); 
        }
    });

    document.getElementById('logoutBtn').onclick = () => {
        signOut(auth).then(() => window.location.replace("index.html"));
    };
</script>
</body>
</html>
