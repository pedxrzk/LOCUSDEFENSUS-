<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Histórico - Locus Defensus</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        .card-historico {
            border-left: 5px solid #143458;
            margin-bottom: 12px;
            animation: fadeIn 0.4s ease;
        }
        .card-historico.aberta { border-left-color: #ff6b6b; } /* Alerta: Porta Aberta */
        .card-historico.fechada { border-left-color: #4ae3b5; } /* Seguro: Porta Fechada */
        
        .card-historico h3 { font-size: 13px; color: #888; margin: 0; }
        .card-historico p { font-size: 16px; font-weight: bold; margin: 5px 0; color: #143458; }
        .card-historico small { color: #aaa; display: block; margin-top: 5px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
    <div class="spinner-circular"></div>
    <p>Sincronizando com Firebase...</p>
</div>

<div class="app" id="app" style="display: none;">
    <button class="menu-toggle" id="menuToggle">☰ Menu</button>

    <nav class="sidebar" id="sidebar">
        <div class="logo-card"><img src="logo.sidebar.png" class="logo"></div>
        <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="controle.html"><i class="fas fa-sliders"></i> Controle</a>
        <a href="historico.html" class="active"><i class="fas fa-clock-rotate-left"></i> Histórico</a>
        <a href="quem.html"><i class="fas fa-users"></i> Quem Somos</a>
        <a href="sobre.html"><i class="fas fa-circle-info"></i> Sobre</a>
        <div class="user-info-group">
            <p id="userSidebar" style="font-weight: bold; color: white; font-size: 14px;"></p>
            <div class="divider"></div>
            <button id="logoutBtn" class="btn-danger">Sair</button>
        </div>
    </nav>

    <main class="main">
        <header class="topbar">
            <h2>Registros do Reed Switch</h2>
            <p id="userTopbar" style="font-size: 11px; color: #888;"></p>
        </header>

        <div class="cards" id="historicoCards">
             <p style='text-align:center; color:#999; padding: 40px;'>Conectando ao sensor porta...</p>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, push, serverTimestamp, query, limitToLast, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDbsCJu94nErqRYQM67BD9OR9lPVkieR4M",
        authDomain: "coleta-7fecd.firebaseapp.com",
        databaseURL: "https://coleta-7fecd-default-rtdb.firebaseio.com",
        projectId: "coleta-7fecd",
        storageBucket: "coleta-7fecd.firebasestorage.app",
        messagingSenderId: "130929270335",
        appId: "1:130929270335:web:8bcdad7cb048b1ec4fa28a",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const container = document.getElementById('historicoCards');
    let ultimaPortaStatus = null; 

    onAuthStateChanged(auth, (user) => {
        if (user) {
            const serialLogado = user.email.split('@')[0];
            const label = "Protótipo SN: " + serialLogado.toUpperCase();
            document.getElementById('userSidebar').textContent = label;
            document.getElementById('userTopbar').textContent = label;
            
            ativarLogsReais(serialLogado);
            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
        } else {
            window.location.replace("index.html");
        }
    });

    async function ativarLogsReais(serial) {
        const portaRef = ref(db, `prototipos/${serial}/porta`);
        const logsRef = ref(db, `prototipos/${serial}/logs_acesso`);

        // 1. ESCUTA O SENSOR (REED SWITCH)
        onValue(portaRef, (snapshot) => {
            const val = snapshot.val();
            const statusAtual = (val === true || val === "aberta") ? "aberta" : "fechada";
            
            // GRAVA MUDANÇA: Só se o status mudar e não for a primeira carga nula
            if (ultimaPortaStatus !== null && ultimaPortaStatus !== statusAtual) {
                const agora = new Date();
                push(logsRef, {
                    tipo: statusAtual,
                    data: agora.toLocaleDateString('pt-BR'),
                    hora: agora.toLocaleTimeString('pt-BR'),
                    timestamp: serverTimestamp()
                });
            }
            ultimaPortaStatus = statusAtual;
        });

        // 2. EXIBE OS LOGS NA TELA
        const consultaLogs = query(logsRef, limitToLast(30));
        onValue(consultaLogs, (snapshot) => {
            container.innerHTML = "";
            const data = snapshot.val();
            
            if (data) {
                // Converte objeto em array e inverte (mais novos primeiro)
                Object.values(data).reverse().forEach(log => {
                    renderizarCard(log);
                });
            } else {
                container.innerHTML = `
                    <div style="text-align:center; padding: 40px; color: #999;">
                        <i class="fas fa-info-circle" style="font-size: 30px; margin-bottom: 10px;"></i>
                        <p>Nenhum log gerado ainda.<br><small>Mova o sensor magnético para registrar.</small></p>
                    </div>`;
            }
        });
    }

    function renderizarCard(item) {
        const article = document.createElement('article');
        article.className = `card card-historico ${item.tipo}`;
        const icone = item.tipo === 'aberta' ? 'fa-door-open' : 'fa-door-closed';
        const texto = item.tipo === 'aberta' ? 'PORTA FOI ABERTA' : 'PORTA FOI FECHADA';

        article.innerHTML = `
            <h3>${item.data}</h3>
            <p><i class="fas ${icone}"></i> ${texto}</p>
            <small><i class="fas fa-clock"></i> Registro: ${item.hora}</small>
        `;
        container.appendChild(article);
    }

    // Sidebar & Menu
    document.getElementById('menuToggle').onclick = (e) => { 
        e.stopPropagation(); 
        document.getElementById('sidebar').classList.toggle('active'); 
    };
    
    document.addEventListener('click', (e) => { 
        if (!document.getElementById('sidebar').contains(e.target)) {
            document.getElementById('sidebar').classList.remove('active'); 
        }
    });

    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => window.location.replace("index.html"));
</script>
</body>
</html>
