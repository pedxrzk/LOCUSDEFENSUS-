<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Histórico - Limno</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
    <div class="spinner-circular"></div>
    <p>Carregando histórico...</p>
</div>

<div class="app" id="app" style="display: none;">
    <button class="menu-toggle" id="menuToggle">☰ Menu</button>

    <nav class="sidebar" id="sidebar">
        <div class="logo-card"><img src="logo.sidebar.png" class="logo"></div>
       <a href="dashboard.html">📊 Dashboard</a>
<a href="controle.html">⚙️ Controle</a>
<a href="historico.html" class="active">🕒 Histórico</a>
<a href="quem.html">👥 Quem Somos</a>
<a href="sobre.html">ℹ️ Sobre</a>

        
        <div class="user-info-group">
            <p id="userSidebar"></p>
            <div class="divider"></div>
            <button id="logoutBtn" class="btn-danger">Sair</button>
        </div>
    </nav>

    <main class="main">
        <header class="topbar">
            <h2>Histórico de Dados</h2>
            <p id="userTopbar" style="font-size: 12px; color: #666;"></p>
        </header>
        <div class="cards" id="historicoCards">
            <article class="card"><h3>25/03/2026</h3><p style="font-size: 18px;">Temp: 26.5°C</p><small style="color:var(--muted)">14:32</small></article>
            <article class="card"><h3>25/03/2026</h3><p style="font-size: 18px;">Temp: 25.8°C</p><small style="color:var(--muted)">10:15</small></article>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDbsCJu94nErqRYQM67BD9OR9lPVkieR4M",
        authDomain: "coleta-7fecd.firebaseapp.com",
        databaseURL: "https://coleta-7fecd-default-rtdb.firebaseio.com",
        projectId: "coleta-7fecd",
        storageBucket: "coleta-7fecd.firebasestorage.app",
        messagingSenderId: "130929270335",
        appId: "1:130929270335:web:8bcdad7cb048b1ec4fa28a",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loader = document.getElementById('loadingOverlay');
    const appEl = document.getElementById('app');
    const sidebar = document.getElementById('sidebar');
    const btnMenu = document.getElementById('menuToggle');

    if(btnMenu) {
        btnMenu.onclick = (e) => { e.stopPropagation(); sidebar.classList.toggle('active'); };
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('userSidebar').textContent = user.email;
            document.getElementById('userTopbar').textContent = user.email;
            loader.style.display = 'none';
            appEl.style.display = 'flex';
        } else {
            window.location.replace("index.html");
        }
    });

    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => window.location.replace("index.html"));

// Script para marcar o link ativo automaticamente (Versão Universal)
const currentPath = window.location.pathname; // Pega o caminho completo da URL
const menuLinks = document.querySelectorAll('.sidebar a');

menuLinks.forEach(link => {
    link.classList.remove('active'); // Limpa seleções anteriores
    
    const href = link.getAttribute('href');

    // Verifica se a URL atual contém o nome da página ou se é a raiz (Home)
    if (currentPath.includes(href) || (currentPath === "/" && href === "dashboard.html")) {
        link.classList.add('active');
    }
});


</script>
</body>
</html>
