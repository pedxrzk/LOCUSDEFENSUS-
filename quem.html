<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quem Somos - Limno</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner-circular"></div>
    <p>Carregando equipe...</p>
</div>

<div class="app" id="app" style="display: none;">
    <nav class="sidebar">
        <div class="logo-card"><img src="logo.sidebar.png" class="logo"></div>
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="controle.html">⚙️ Controle</a>
        <a href="historico.html">🕒 Histórico</a>
        <a href="quem.html">👥 Quem Somos</a>
        <a href="sobre.html">ℹ️ Sobre</a>
        <div style="margin-top: auto; padding: 15px;">
            <p id="userSidebar" style="font-size: 10px; color: #ccc;"></p>
            <button id="logoutBtn" class="btn-danger">Sair</button>
        </div>
    </nav>

    <main class="main">
        <header class="topbar"><h2>Nossa Equipe</h2></header>
        <div class="cards">
            <div class="card"><h3>Pedro Paulo</h3><p>UI Designer</p></div>
            <div class="card"><h3>Yasmin</h3><p>Testes</p></div>
            <div class="card"><h3>Kelen</h3><p>Documentação</p></div>
        </div>
    </main>
</div>

<script type="module">
    /* MESMO SCRIPT DO HISTÓRICO (IMPORTANTE MANTER A TRAVA DE SEGURANÇA) */
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    const firebaseConfig = { /* coloque seus dados aqui */ };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
        } else {
            window.location.replace("index.html");
        }
    });
</script>
</body>
</html>
