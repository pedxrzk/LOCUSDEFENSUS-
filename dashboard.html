<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "coleta-7fecd.firebaseapp.com",
  projectId: "coleta-7fecd",
  appId: "1:130929270335:web:8bcdad7cb048b1ec4fa28a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔒 Esconde a tela até verificar login
document.body.style.display = "none";

onAuthStateChanged(auth, (user) => {
  // mostra a página depois da verificação
  document.body.style.display = "block";

  if (user) {
    // usuário logado
    const userElement = document.getElementById("user");
    if (userElement) {
      userElement.innerText = "👤 " + user.email;
    }
  } else {
    // não logado → volta pro login
    window.location.href = "index.html";
  }
});

// 🚪 logout
window.logout = function() {
  signOut(auth)
    .then(() => {
      window.location.href = "login.html";
    })
    .catch((error) => {
      console.error("Erro ao sair:", error);
      alert("Erro ao sair");
    });
};
</script>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div class="logo-card">
            <img src="logo.sidebar.png" alt="Logo" class="logo">
        </div>

        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="controle.html">Controle</a>
        <a href="historico.html">Histórico</a>
        <a href="quem.html">Quem Somos</a>
        <a href="sobre.html">Sobre</a>

        <button class="btn btn-danger mt-20" onclick="logout()">
            Sair
        </button>
    </div>

    <!-- OVERLAY -->
    <div class="overlay" onclick="toggleMenu()"></div>

    <!-- CONTEÚDO -->
    <div class="main">

        <div class="topbar">
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <h2>Dashboard</h2>
            <p id="user"></p>
        </div>

        <div class="cards">

            <div class="card">
                <h3>🌡️ Temperatura</h3>
                <p>25.7°C</p>
            </div>

            <div class="card">
                <h3>💧 Umidade</h3>
                <p>55%</p>
            </div>

            <div class="card">
                <h3>📊 Pressão</h3>
                <p>Normal</p>
            </div>

            <div class="card">
                <h3>🔊 Buzzer</h3>
                <p>Desligado</p>
            </div>

            <div class="card">
                <h3>💡 LED</h3>
                <p>Ligado</p>
            </div>

        </div>

    </div>

</div>

<!-- JS FORA DO MODULE -->
<script>
function toggleMenu() {
    document.querySelector(".sidebar").classList.toggle("active");
    document.querySelector(".overlay").classList.toggle("active");
}

// fecha ao clicar em link
document.querySelectorAll(".sidebar a").forEach(link => {
    link.addEventListener("click", () => {
        document.querySelector(".sidebar").classList.remove("active");
        document.querySelector(".overlay").classList.remove("active");
    });
});
</script>

</body>
</html>
