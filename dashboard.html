<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOADING -->
<div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Carregando dashboard...</p>
</div>

<!-- APP -->
<div class="app" id="app" style="display: none;">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo-card">
            <img src="logo.sidebar.png" alt="Logo" class="logo" onerror="this.style.display='none'">
        </div>

        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="controle.html">Controle</a>
        <a href="historico.html">Histórico</a>
        <a href="quem.html">Quem Somos</a>
        <a href="sobre.html">Sobre</a>

        <button class="btn btn-danger mt-20" id="logoutBtn">
            Sair
        </button>
    </div>

    <!-- OVERLAY -->
    <div class="overlay" onclick="toggleMenu()"></div>

    <!-- CONTEÚDO -->
    <div class="main">

        <div class="topbar">
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <h2>Dashboard</h2>
            <p id="user"></p>
        </div>

        <div class="cards">
            <div class="card">
                <h3>🌡️ Temperatura</h3>
                <p>25.7°C</p>
            </div>

            <div class="card">
                <h3>💧 Umidade</h3>
                <p>55%</p>
            </div>

            <div class="card">
                <h3>📊 Pressão</h3>
                <p>Normal</p>
            </div>

            <div class="card">
                <h3>🔊 Buzzer</h3>
                <p>Desligado</p>
            </div>

            <div class="card">
                <h3>💡 LED</h3>
                <p>Ligado</p>
            </div>
        </div>

    </div>
</div>

<!-- SPINNER STYLE -->
<style>
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.loading {
    position: fixed;
    inset: 0;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 9999;
    gap: 20px;
}

.spinner {
    width: 50px;
    height: 50px;
    border: 5px solid #f3f3f3;
    border-top: 5px solid #667eea;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}
</style>

<!-- FIREBASE -->
<script type="importmap">
{
  "imports": {
    "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
  }
}
</script>

<script type="module">
import { initializeApp } from "firebase/app";
import { getAuth, onAuthStateChanged, signOut } from "firebase/auth";

const firebaseConfig = {
    apiKey: "SUA_KEY",
    authDomain: "SEU_DOMINIO",
    projectId: "SEU_ID",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const loadingEl = document.getElementById('loading');
const appEl = document.getElementById('app');
const userEl = document.getElementById('user');
const logoutBtn = document.getElementById('logoutBtn');

// MENU
window.toggleMenu = function() {
    document.querySelector(".sidebar").classList.toggle("active");
    document.querySelector(".overlay").classList.toggle("active");
};

// LOGOUT
logoutBtn.onclick = async () => {
    await signOut(auth);
    window.location.href = "index.html";
};

// AUTH
onAuthStateChanged(auth, (user) => {
    if (user) {
        userEl.innerText = "👤 " + user.email;
        loadingEl.style.display = "none";
        appEl.style.display = "block";
    } else {
        window.location.replace("index.html");
    }
});
</script>

</body>
</html>
