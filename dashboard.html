<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Limno</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner-circular"></div>
    <p>Carregando dashboard...</p>
</div>

<div class="app" id="app" style="display: none;">
    <nav class="sidebar" id="sidebar">
        <div class="logo-card">
            <img src="logo.sidebar.png" alt="Limno Logo" class="logo">
        </div>

        <a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
        <a href="controle.html" class="active"><i class="fa-solid fa-sliders"></i> Controle</a>
        <a href="historico.html"><i class="fa-solid fa-clock-rotate-left"></i> Histórico</a>
        <a href="quem.html"><i class="fa-solid fa-users"></i> Quem Somos</a>
        <a href="sobre.html"><i class="fa-solid fa-circle-info"></i> Sobre</a>

        <div style="margin-top: 30px; padding: 15px; border-top: 1px solid rgba(255,255,255,0.1);">
            <p style="font-size: 11px; color: rgba(255,255,255,0.6); margin-bottom: 8px; word-break: break-all;" id="userSidebar">
                carregando...
            </p>
            <button class="btn-danger" id="logoutBtn">
                <i class="fa-solid fa-right-from-bracket"></i> Sair
            </button>
        </div>
    </nav>
    <div class="overlay" id="overlay"></div>

    <main class="main">
        <header class="topbar">
            <div style="flex: 1; min-width: 0;">
                <h2>Painel de Controle</h2>
                <p class="user-email" id="userTopbar">carregando...</p>
            </div>
            <button class="menu-btn" id="menuBtn">☰</button>
        </header>

        <div class="cards">
            <div class="card"><h3>🌡️ Temperatura</h3><p>25.7°C</p></div>
            <div class="card"><h3>💧 Umidade</h3><p>55%</p></div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDbsCJu94nErqRYQM67BD9OR9lPVkieR4M",
        authDomain: "coleta-7fecd.firebaseapp.com",
        databaseURL: "https://coleta-7fecd-default-rtdb.firebaseio.com",
        projectId: "coleta-7fecd",
        storageBucket: "coleta-7fecd.firebasestorage.app",
        messagingSenderId: "130929270335",
        appId: "1:130929270335:web:8bcdad7cb048b1ec4fa28a",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loading = document.getElementById('loadingOverlay');
    const appDiv = document.getElementById('app');

    // ==========================================
    // TRAVA DE SEGURANÇA: FORÇA ABERTURA EM 2s
    // ==========================================
    const forceShow = setTimeout(() => {
        console.log("Forçando exibição por timeout");
        if(loading) loading.style.display = 'hidden';
        if(appDiv) appDiv.style.display = 'flex';
    }, 2000);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            clearTimeout(forceShow); // Cancela a trava se o firebase responder antes
            
            // Tenta preencher os campos, mas não trava se não existirem
            const tBar = document.getElementById('userTopbar');
            const sBar = document.getElementById('userSidebar');
            if(tBar) tBar.textContent = user.email;
            if(sBar) sBar.textContent = user.email;

            if(loading) loading.style.display = 'none';
            if(appDiv) appDiv.style.display = 'flex';
        } else {
            window.location.replace("index.html");
        }
    });

    const btnLogout = document.getElementById('logoutBtn');
    if(btnLogout) {
        btnLogout.onclick = () => signOut(auth).then(() => window.location.replace("index.html"));
    }
</script>
</body>
</html>
