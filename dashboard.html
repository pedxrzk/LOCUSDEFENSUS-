<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title><!-- FIREBASE IMPORT --><script type="importmap">
{
  "imports": {
    "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
  }
}
</script><style>
:root {
    --primary: #1b1f5e;
    --primary-light: #2e367d;
    --background: #f4f6fb;
    --card-bg: #ffffff;
    --text: #111827;
}

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* BASE */
html, body {
    overflow-x: hidden;
}

body {
    background: var(--background);
}

/* LAYOUT */
.app {
    min-height: 100vh;
}

/* FLEX só desktop */
@media (min-width: 769px) {
    .app {
        display: flex;
    }
}

/* SIDEBAR */
.sidebar {
    width: 260px;
    background: var(--primary);
    color: white;
    padding: 20px;
}

.sidebar a {
    display: block;
    color: white;
    padding: 10px;
    text-decoration: none;
}

.sidebar a:hover {
    background: var(--primary-light);
}

/* MAIN */
.main {
    flex: 1;
    background: white;
    padding: 24px;
}

/* CARDS */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

.card {
    padding: 20px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

/* MENU */
.menu-btn {
    font-size: 22px;
    background: none;
    border: none;
}

/* OVERLAY */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
}

.overlay.active {
    display: block;
}

/* MOBILE */
@media (max-width: 768px) {

    .sidebar {
        position: fixed;
        top: 0;
        left: -260px;
        height: 100%;
        transition: 0.3s;
        z-index: 999;
    }

    .sidebar.active {
        left: 0;
    }

    .cards {
        grid-template-columns: 1fr;
    }
}

/* UTIL */
.hidden {
    display: none;
}

/* LOADING */
.loading {
    position: fixed;
    inset: 0;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
}
</style></head><body><!-- LOADING --><div class="loading" id="loading">
    <div style="width:50px;height:50px;border:5px solid #eee;border-top:5px solid #667eea;border-radius:50%;animation:spin 1s linear infinite;"></div>
    <p>Carregando...</p>
</div><!-- APP --><div class="app hidden" id="app"><!-- SIDEBAR -->
<div class="sidebar">
    <a href="#" class="active">Dashboard</a>
    <a href="#">Controle</a>
    <a href="#">Histórico</a>
    <button id="logoutBtn">Sair</button>
</div>

<!-- OVERLAY -->
<div class="overlay" onclick="toggleMenu()"></div>

<!-- MAIN -->
<div class="main">
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <h2>Dashboard</h2>
    <p id="user"></p>

    <div class="cards">
        <div class="card"><h3>🌡️ Temperatura</h3><p>25°C</p></div>
        <div class="card"><h3>💧 Umidade</h3><p>55%</p></div>
        <div class="card"><h3>📊 Pressão</h3><p>Normal</p></div>
    </div>
</div>

</div><script type="module">
import { initializeApp } from "firebase/app";
import { getAuth, onAuthStateChanged, signOut } from "firebase/auth";

/* 🔥 COLE SEU FIREBASE AQUI */
const firebaseConfig = {
    apiKey: "SUA_API_KEY",
    authDomain: "SEU_DOMINIO",
    projectId: "SEU_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const loading = document.getElementById("loading");
const appEl = document.getElementById("app");
const userEl = document.getElementById("user");
const logoutBtn = document.getElementById("logoutBtn");

/* MENU */
window.toggleMenu = function() {
    document.querySelector(".sidebar").classList.toggle("active");
    document.querySelector(".overlay").classList.toggle("active");
};

/* LOGOUT */
logoutBtn.onclick = async () => {
    await signOut(auth);
    window.location.href = "index.html";
};

/* AUTH */
onAuthStateChanged(auth, (user) => {
    if (user) {
        userEl.innerText = "👤 " + user.email;

        loading.style.display = "none";
        appEl.classList.remove("hidden");

    } else {
        window.location.replace("index.html");
    }
});
</script><style>
@keyframes spin {
    to { transform: rotate(360deg); }
}
</style></body>
</html>
