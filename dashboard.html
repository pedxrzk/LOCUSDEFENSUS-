<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Dashboard - Limno</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner-circular"></div>
    <p>Carregando...</p>
</div>

<div class="app" id="app" style="display: none;">
    <nav class="sidebar">
        <div class="logo-card">
            <img src="logo.sidebar.png" class="logo">
        </div>
        
        <a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
        <a href="controle.html"><i class="fa-solid fa-sliders"></i> Controle</a>
        <a href="historico.html"><i class="fa-solid fa-clock-rotate-left"></i> Histórico</a>
        <a href="quem.html"><i class="fa-solid fa-users"></i> Quem Somos</a>
        <a href="sobre.html"><i class="fa-solid fa-circle-info"></i> Sobre</a>

        <div style="margin-top: auto; padding-top: 20px;">
            <p id="userSidebar" style="font-size: 12px; margin-bottom: 10px; opacity: 0.7;"></p>
            <button id="logoutBtn" class="btn-danger">Sair</button>
        </div>
    </nav>

    <main class="main">
        <p id="userTopbar"></p>
        </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { /* SEUS DADOS AQUI */ };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loading = document.getElementById('loadingOverlay');
    const appDiv = document.getElementById('app');

    // SEGURANÇA: Se em 3 segundos não carregar, força a abertura
    setTimeout(() => {
        if (loading) loading.classList.add('hidden');
        if (appDiv) appDiv.style.display = "flex";
    }, 3000);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            // Verifica se os elementos existem antes de mudar o texto (EVITA O TRAVAMENTO)
            const uTop = document.getElementById('userTopbar');
            const uSide = document.getElementById('userSidebar');
            if (uTop) uTop.textContent = user.email;
            if (uSide) uSide.textContent = user.email;

            loading.classList.add('hidden');
            appDiv.style.display = "flex";
        } else {
            window.location.replace("index.html");
        }
    });

    const btnSair = document.getElementById('logoutBtn');
    if (btnSair) {
        btnSair.onclick = () => signOut(auth).then(() => window.location.replace("index.html"));
    }
</script>



</body>
</html>
