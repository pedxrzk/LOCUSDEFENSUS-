<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Limno</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner-circular"></div>
    <p>Carregando dashboard...</p>
</div>

<div class="app" id="app" style="display: none;">
    <nav class="sidebar" id="sidebar">
        <div class="logo-card">
            <img src="logo.sidebar.png" alt="Limno Logo" class="logo">
        </div>

        <a href="dashboard.html">📊 Dashboard</a>
        <a href="controle.html">⚙️ Controle</a>
        <a href="historico.html">🕒 Histórico</a>
        <a href="quem.html">👥 Quem Somos</a>
        <a href="sobre.html">ℹ️ Sobre</a>

        <div style="margin-top: auto; padding: 15px; border-top: 1px solid rgba(255,255,255,0.1);">
            <p id="userSidebar" style="font-size: 11px; color: rgba(255,255,255,0.6); margin-bottom: 8px;"></p>
            <button class="btn-danger" id="logoutBtn">Sair</button>
        </div>
    </nav>

    <main class="main">
        <header class="topbar">
            <div>
                <h2>Painel Principal</h2>
                <p class="user-email" id="userTopbar">carregando...</p>
            </div>
        </header>

        <div class="cards">
            <article class="card">
                <h3>Temperatura</h3>
                <p>25.7°C</p>
            </article>
            <article class="card">
                <h3>Umidade</h3>
                <p>55%</p>
            </article>
            <article class="card">
                <h3>Pressão</h3>
                <p>Normal</p>
            </article>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDbsCJu94nErqRYQM67BD9OR9lPVkieR4M",
        authDomain: "coleta-7fecd.firebaseapp.com",
        databaseURL: "https://coleta-7fecd-default-rtdb.firebaseio.com",
        projectId: "coleta-7fecd",
        storageBucket: "coleta-7fecd.firebasestorage.app",
        messagingSenderId: "130929270335",
        appId: "1:130929270335:web:8bcdad7cb048b1ec4fa28a",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loader = document.getElementById('loadingOverlay');
    const appEl = document.getElementById('app');

    // SEGURANÇA: Força a abertura após 2.5 segundos
    setTimeout(() => {
        if(loader) loader.style.display = 'none';
        if(appEl) appEl.style.display = 'flex';
    }, 2500);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            const ut = document.getElementById('userTopbar');
            const us = document.getElementById('userSidebar');
            if(ut) ut.textContent = user.email;
            if(us) us.textContent = user.email;
            
            if(loader) loader.style.display = 'none';
            if(appEl) appEl.style.display = 'flex';
        } else {
            window.location.replace("index.html");
        }
    });

    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => window.location.replace("index.html"));
</script>
</body>
</html>
