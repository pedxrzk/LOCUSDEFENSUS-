<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Limno</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
    <div class="spinner-circular"></div>
    <p style="margin-top:15px;">Carregando dashboard...</p>
</div>

<div class="app" id="app" style="display: none;">
    <button class="menu-toggle" id="menuToggle">☰ Menu</button>

    <<nav class="sidebar" id="sidebar">
    <div class="logo-card">
        <img src="logo.sidebar.png" class="logo">
    </div>

    <a href="dashboard.html">📊 Dashboard</a>
    <a href="controle.html">⚙️ Controle</a>
    <a href="historico.html">🕒 Histórico</a>
    <a href="quem.html">👥 Quem Somos</a>
    <a href="sobre.html">ℹ️ Sobre</a>
    
    <div class="user-info-group">
        <p id="userSidebar"></p>
        <div class="divider"></div>
        <button id="logoutBtn" class="btn-danger">Sair</button>
    </div>
</nav>



    <main class="main">
        <header class="topbar">
            <h2>Painel Principal</h2>
            <p id="userTopbar" style="font-size: 12px; color: #666;"></p>
        </header>
        <div class="cards">
            <div class="card"><h3>Temperatura</h3><p>25.7°C</p></div>
            <div class="card"><h3>Umidade</h3><p>55%</p></div>
            <div class="card"><h3>Pressão</h3><p>Normal</p></div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDbsCJu94nErqRYQM67BD9OR9lPVkieR4M",
        authDomain: "coleta-7fecd.firebaseapp.com",
        databaseURL: "https://coleta-7fecd-default-rtdb.firebaseio.com",
        projectId: "coleta-7fecd",
        storageBucket: "coleta-7fecd.firebasestorage.app",
        messagingSenderId: "130929270335",
        appId: "1:130929270335:web:8bcdad7cb048b1ec4fa28a",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loader = document.getElementById('loadingOverlay');
    const appEl = document.getElementById('app');
    const sidebar = document.getElementById('sidebar');
    const btnMenu = document.getElementById('menuToggle');

    function forceShow() {
        if(loader) loader.style.display = 'none';
        if(appEl) appEl.style.display = 'flex';
    }

    // Lógica do Menu Lateral
    if(btnMenu) {
        btnMenu.onclick = (e) => {
            e.stopPropagation();
            sidebar.classList.toggle('active');
        };
    }

    // Fechar menu ao clicar em um link (Mobile)
    document.querySelectorAll('.sidebar a').forEach(link => {
        link.onclick = () => sidebar.classList.remove('active');
    });

    // Fechar ao clicar fora do menu
    document.addEventListener('click', (e) => {
        if (window.innerWidth <= 768 && !sidebar.contains(e.target) && e.target !== btnMenu) {
            sidebar.classList.remove('active');
        }
    });

    setTimeout(forceShow, 2000);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            if(document.getElementById('userTopbar')) document.getElementById('userTopbar').textContent = user.email;
            if(document.getElementById('userSidebar')) document.getElementById('userSidebar').textContent = user.email;
            forceShow();
        } else {
            window.location.replace("index.html");
        }
    });

    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => window.location.replace("index.html"));
</script>
</body>
</html>
