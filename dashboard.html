<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Dashboard - Limno</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner-circular"></div>
    <p id="loadingText">Carregando dashboard...</p>
</div>

<div class="app" id="app" style="display: none;">

    <nav class="sidebar" id="sidebar">
        <div class="logo-card">
            <img src="logo.sidebar.png" alt="Limno Logo" class="logo">
            <span style="font-size: 24px; font-weight: bold; color: white; display: none;" id="logoFallback">LIMNO</span>
        </div>

        <a href="dashboard.html" class="active"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
        <a href="controle.html"><i class="fa-solid fa-sliders"></i> Controle</a>
        <a href="historico.html"><i class="fa-solid fa-clock-rotate-left"></i> Histórico</a>
        <a href="quem.html"><i class="fa-solid fa-users"></i> Quem Somos</a>
        <a href="sobre.html"><i class="fa-solid fa-circle-info"></i> Sobre</a>

        <div style="margin-top: 30px; padding: 15px; border-top: 1px solid rgba(255,255,255,0.1);">
            <p style="font-size: 11px; color: rgba(255,255,255,0.6); margin-bottom: 8px; word-break: break-all;" id="userSidebar">
                carregando...
            </p>
            <button class="btn-danger" id="logoutBtn">
                <i class="fa-solid fa-right-from-bracket"></i> Sair
            </button>
        </div>
    </nav>

    <div class="overlay" id="overlay"></div>

    <main class="main">
        <header class="topbar">
            <div style="flex: 1; min-width: 0;">
                <h2>Painel Principal</h2>
                <p class="user-email" id="userTopbar">carregando...</p>
            </div>
            <button class="menu-btn" id="menuBtn" aria-label="Abrir menu">☰</button>
        </header>

        <div class="cards">
            <article class="card">
                <h3>🌡️ Temperatura</h3>
                <p>25.7°C</p>
            </article>
            <article class="card">
                <h3>💧 Umidade</h3>
                <p>55%</p>
            </article>
            <article class="card">
                <h3>📊 Pressão</h3>
                <p>Normal</p>
            </article>
            <article class="card">
                <h3>🔊 Buzzer</h3>
                <p>Desligado</p>
            </article>
            <article class="card">
                <h3>💡 LED</h3>
                <p>Ligado</p>
            </article>
        </div>
    </main>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
        }
    }
</script>

<script type="module">
    // FORÇAR SAÍDA DO LOADING (ADICIONE ISSO AQUI)
    setTimeout(() => {
        const loading = document.getElementById('loadingOverlay');
        if (loading) loading.classList.add('hidden');
        const appEl = document.getElementById('app');
        if (appEl) appEl.style.display = "flex";
        console.log("Loading removido por segurança.");
    }, 2000);

    // ... restante do seu código Firebase atual ...

    import { initializeApp } from "firebase/app";
    import { getAuth, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "firebase/auth";

    const firebaseConfig = {
        apiKey: "AIzaSyDbsCJu94nErqRYQM67BD9OR9lPVkieR4M",
        authDomain: "coleta-7fecd.firebaseapp.com",
        databaseURL: "https://coleta-7fecd-default-rtdb.firebaseio.com",
        projectId: "coleta-7fecd",
        storageBucket: "coleta-7fecd.firebasestorage.app",
        messagingSenderId: "130929270335",
        appId: "1:130929270335:web:8bcdad7cb048b1ec4fa28a",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    setPersistence(auth, browserLocalPersistence);

    // Seleção de elementos com verificação
    const loadingOverlay = document.getElementById('loadingOverlay');
    const appEl = document.getElementById('app');
    const userTopbar = document.getElementById('userTopbar');
    const userSidebar = document.getElementById('userSidebar');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const menuBtn = document.getElementById('menuBtn');
    const logoutBtn = document.getElementById('logoutBtn');

    // Menu Toggle
    function toggleMenu() {
        if (sidebar && overlay) {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }
    }

    if (menuBtn) menuBtn.onclick = toggleMenu;
    if (overlay) overlay.onclick = toggleMenu;

    // Lógica de Autenticação (A prova de falhas)
    let authInitialized = false;

    onAuthStateChanged(auth, (user) => {
        if (!authInitialized) {
            authInitialized = true;
            if (user) {
                // Preenche os campos de e-mail apenas se existirem
                if (userTopbar) userTopbar.textContent = user.email;
                if (userSidebar) userSidebar.textContent = user.email;
                
                // Remove o loading após 1s
                setTimeout(() => {
                    if (loadingOverlay) loadingOverlay.classList.add('hidden');
                    if (appEl) appEl.style.display = "flex";          
                }, 1000); 

            } else {
                window.location.replace("index.html");
            }
        }
    });

    // Logout
    if (logoutBtn) {
        logoutBtn.onclick = async () => {
            if (confirm('Deseja realmente sair?')) {
                await signOut(auth);
                window.location.replace("index.html");
            }
        };
    }

    // Erro na Logo
    const logoImg = document.querySelector('.logo');
    if (logoImg) {
        logoImg.onerror = function() {
            this.style.display = 'none';
            const fallback = document.getElementById('logoFallback');
            if (fallback) fallback.style.display = 'block';
        };
    }
</script>

</body>
</html>
