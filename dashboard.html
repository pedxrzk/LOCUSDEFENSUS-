<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - Locus Defensus</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        .card-action { cursor: pointer; transition: transform 0.2s, background 0.2s; }
        .card-action:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.2); }
        .card h3 i { margin-right: 8px; color: #143458; width: 20px; text-align: center; }
        .alerta-critico { border: 2px solid #ff6b6b !important; animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 107, 107, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0); }
        }
        #btnAtivarPush {
            display: none; background: #ff6b6b; color: white; border: none;
            padding: 12px; width: 100%; border-radius: 8px; margin-bottom: 15px;
            font-weight: bold; cursor: pointer; animation: pulse 2s infinite;
        }
    </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
    <div class="spinner-circular"></div>
    <p>Conectando ao Locus Defensus...</p>
</div>

<div class="app" id="app" style="display: none;">
    <button class="menu-toggle" id="menuToggle">☰ Menu</button>

    <nav class="sidebar" id="sidebar">
        <div class="logo-card"><img src="logo.sidebar.png" class="logo"></div>
        <a href="dashboard.html" class="active"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="controle.html"><i class="fas fa-sliders"></i> Controle</a>
        <a href="historico.html"><i class="fas fa-clock-rotate-left"></i> Histórico</a>
        <a href="quem.html"><i class="fas fa-users"></i> Quem Somos</a>
        <a href="sobre.html"><i class="fas fa-circle-info"></i> Sobre</a>
        <div class="user-info-group">
            <p id="userSidebar" style="font-size: 14px; font-weight: bold; color: #fff;"></p>
            <div class="divider"></div>
            <button id="logoutBtn" class="btn-danger">Sair</button>
        </div>
    </nav>

    <main class="main">
        <header class="topbar">
            <h2 id="tituloPainel">Painel de Monitoramento</h2>
            <p id="userTopbar" style="font-size: 12px; color: #666;"></p>
        </header>

        <button id="btnAtivarPush">🔔 CLIQUE PARA ATIVAR ALERTAS NO APP</button>

        <div class="cards">
            <div class="card">
                <h3><i class="fas fa-thermometer-half"></i> TEMPERATURA</h3>
                <p id="tempValue">--.-°C</p>
            </div>
            <div class="card">
                <h3><i class="fas fa-droplet"></i> UMIDADE</h3>
                <p id="humiValue">--%</p>
            </div>
            <div class="card">
                <h3><i class="fas fa-gauge-high"></i> PRESSÃO</h3>
                <p id="presValue">---- hPa</p>
            </div>
            <div class="card" id="cardPorta">
                <h3><i class="fas fa-door-closed" id="doorIcon"></i> ESTADO DA PORTA</h3>
                <p id="doorStatus">Sincronizando...</p>
            </div>
            <div class="card card-action" id="cardFan">
                <h3><i class="fas fa-fan"></i> VENTOINHA</h3>
                <p id="fanStatus">---</p>
            </div>
            <div class="card card-action" id="cardBuzzer">
                <h3><i class="fas fa-bullhorn"></i> ALERTA SONORO</h3>
                <p id="buzzerStatus">---</p>
            </div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDbsCJu94nErqRYQM67BD9OR9lPVkieR4M",
        authDomain: "coleta-7fecd.firebaseapp.com",
        databaseURL: "https://coleta-7fecd-default-rtdb.firebaseio.com",
        projectId: "coleta-7fecd",
        storageBucket: "coleta-7fecd.firebasestorage.app",
        messagingSenderId: "130929270335",
        appId: "1:130929270335:web:8bcdad7cb048b1ec4fa28a",
    };

    const fbApp = initializeApp(firebaseConfig);
    const auth = getAuth(fbApp);
    const db = getDatabase(fbApp);

    const loader = document.getElementById('loadingOverlay');
    const appEl = document.getElementById('app');
    const btnAtivarPush = document.getElementById('btnAtivarPush');

    let serialAtual = "";
    let jaNotificou = false;

    // Registro do Service Worker para o App
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(e => console.error("Erro SW:", e));
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            serialAtual = user.email.split('@')[0];
            document.getElementById('userTopbar').textContent = "ID: " + serialAtual;
            document.getElementById('userSidebar').textContent = "ID: " + serialAtual;
            document.getElementById('tituloPainel').textContent = "Monitoramento " + serialAtual;
            
            // Verifica se precisa pedir permissão no APK
            if (Notification.permission !== "granted") {
                btnAtivarPush.style.display = "block";
            }

            iniciarMonitoramento(serialAtual);
            setTimeout(() => { loader.style.display = 'none'; appEl.style.display = 'flex'; }, 1500);
        } else {
            window.location.replace("index.html");
        }
    });

    btnAtivarPush.onclick = async () => {
        const res = await Notification.requestPermission();
        if (res === "granted") {
            btnAtivarPush.style.display = "none";
            new Notification("Locus Defensus", { body: "Notificações ativadas no seu celular!" });
        }
    };

    function iniciarMonitoramento(serial) {
        onValue(ref(db, 'prototipos/' + serial), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('tempValue').textContent = (data.temperatura || "0") + "°C";
                document.getElementById('humiValue').textContent = (data.umidade || "0") + "%";
                document.getElementById('presValue').textContent = (data.pressao || "0") + " hPa";
                
                const aberta = data.porta === true || data.porta === "aberta";
                const doorTxt = document.getElementById('doorStatus');
                const doorCard = document.getElementById('cardPorta');
                
                doorTxt.textContent = aberta ? "ABERTA" : "FECHADA";
                doorTxt.style.color = aberta ? "#ff6b6b" : "#4ae3b5";
                
                if(aberta) {
                    doorCard.classList.add('alerta-critico');
                    if (!jaNotificou && Notification.permission === "granted") {
                        navigator.serviceWorker.ready.then(reg => {
                            reg.showNotification("⚠️ ALERTA", {
                                body: "Porta " + serial + " foi aberta!",
                                icon: "logo.sidebar.png",
                                vibrate: [300, 100, 300],
                                tag: 'alerta-porta'
                            });
                        });
                        jaNotificou = true;
                    }
                } else {
                    doorCard.classList.remove('alerta-critico');
                    jaNotificou = false;
                }
                
                document.getElementById('fanStatus').textContent = data.ventoinha ? "LIGADA" : "DESLIGADA";
                document.getElementById('fanStatus').style.color = data.ventoinha ? "#4ae3b5" : "#666";
                document.getElementById('buzzerStatus').textContent = data.buzzer ? "ATIVO" : "OFF";
                document.getElementById('buzzerStatus').style.color = data.buzzer ? "#ff6b6b" : "#666";
            }
        });
    }

    document.getElementById('cardFan').onclick = () => {
        const atual = document.getElementById('fanStatus').textContent === "LIGADA";
        set(ref(db, `prototipos/${serialAtual}/ventoinha`), !atual);
    };

    document.getElementById('cardBuzzer').onclick = () => {
        const atual = document.getElementById('buzzerStatus').textContent === "ATIVO";
        set(ref(db, `prototipos/${serialAtual}/buzzer`), !atual);
    };

    document.getElementById('logoutBtn').onclick = () => signOut(auth);
    
    // Sidebar logic
    const sidebar = document.getElementById('sidebar');
    document.getElementById('menuToggle').onclick = (e) => { e.stopPropagation(); sidebar.classList.toggle('active'); };
    document.addEventListener('click', (e) => { if (sidebar.classList.contains('active') && !sidebar.contains(e.target)) sidebar.classList.remove('active'); });
</script>
</body>
</html>
