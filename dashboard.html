<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - Locus Defensus</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        /* Estilos para interatividade dos cards */
        .card-action {
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        .card-action:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.2);
        }

        /* Títulos dos cards com ícones */
        .card h3 i {
            margin-right: 8px;
            color: #143458;
            width: 20px;
            text-align: center;
        }

        /* Alerta visual para porta aberta */
        .alerta-critico {
            border: 2px solid #ff6b6b !important;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 107, 107, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0); }
        }
    </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
    <div class="spinner-circular"></div>
    <p>Sincronizando com o protótipo Locus Defensus...</p>
</div>

<div class="app" id="app" style="display: none;">
    <button class="menu-toggle" id="menuToggle">☰ Menu</button>

    <nav class="sidebar" id="sidebar">
        <div class="logo-card"><img src="logo.sidebar.png" class="logo"></div>
        <a href="dashboard.html" class="active"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="controle.html"><i class="fas fa-sliders"></i> Controle</a>
        <a href="historico.html"><i class="fas fa-clock-rotate-left"></i> Histórico</a>
        <a href="quem.html"><i class="fas fa-users"></i> Quem Somos</a>
        <a href="sobre.html"><i class="fas fa-circle-info"></i> Sobre</a>
        
        <div class="user-info-group">
            <p id="userSidebar" style="font-size: 14px; font-weight: bold; color: #fff;"></p>
            <div class="divider"></div>
            <button id="logoutBtn" class="btn-danger">Sair</button>
        </div>
    </nav>

    <main class="main">
        <header class="topbar">
            <h2 id="tituloPainel">Painel de Monitoramento</h2>
            <p id="userTopbar" style="font-size: 12px; color: #666;"></p>
        </header>

        <div class="cards">
            <div class="card">
                <h3><i class="fas fa-thermometer-half"></i> TEMPERATURA</h3>
                <p id="tempValue">--.-°C</p>
            </div>

            <div class="card">
                <h3><i class="fas fa-droplet"></i> UMIDADE</h3>
                <p id="humiValue">--%</p>
            </div>

            <div class="card">
                <h3><i class="fas fa-gauge-high"></i> PRESSÃO</h3>
                <p id="presValue">---- hPa</p>
            </div>

            <div class="card" id="cardPorta">
                <h3><i class="fas fa-door-closed" id="doorIcon"></i> ESTADO DA PORTA</h3>
                <p id="doorStatus">Carregando...</p>
            </div>

            <div class="card card-action" id="cardFan">
                <h3><i class="fas fa-fan"></i> VENTOINHA</h3>
                <p id="fanStatus">---</p>
            </div>

            <div class="card card-action" id="cardBuzzer">
                <h3><i class="fas fa-bullhorn"></i> ALERTA SONORO</h3>
                <p id="buzzerStatus">---</p>
            </div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDbsCJu94nErqRYQM67BD9OR9lPVkieR4M",
        authDomain: "coleta-7fecd.firebaseapp.com",
        databaseURL: "https://coleta-7fecd-default-rtdb.firebaseio.com",
        projectId: "coleta-7fecd",
        storageBucket: "coleta-7fecd.firebasestorage.app",
        messagingSenderId: "130929270335",
        appId: "1:130929270335:web:8bcdad7cb048b1ec4fa28a",
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const auth = getAuth(firebaseApp);
    const db = getDatabase(firebaseApp);

    const loader = document.getElementById('loadingOverlay');
    const appEl = document.getElementById('app');
    const sidebar = document.getElementById('sidebar');
    const btnMenu = document.getElementById('menuToggle');

    let serialAtual = "";
    let jaNotificouPorta = false; // Controle de notificação

    onAuthStateChanged(auth, (user) => {
        if (user) {
            serialAtual = user.email.split('@')[0];
            
            const label = "Protótipo: " + serialAtual;
            document.getElementById('userTopbar').textContent = label;
            document.getElementById('userSidebar').textContent = label;
            document.getElementById('tituloPainel').textContent = "Monitoramento " + serialAtual;
            
            // Solicita permissão de notificação push assim que logar
            if ("Notification" in window) {
                Notification.requestPermission();
            }

            iniciarMonitoramento(serialAtual);
            forceShow();
        } else {
            window.location.replace("index.html");
        }
    });

    function iniciarMonitoramento(serial) {
        const caminhoRef = ref(db, 'prototipos/' + serial);
        
        onValue(caminhoRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // Sensores
                document.getElementById('tempValue').textContent = (data.temperatura || "0") + "°C";
                document.getElementById('humiValue').textContent = (data.umidade || "0") + "%";
                document.getElementById('presValue').textContent = (data.pressao || "0") + " hPa";
                
                // Lógica da Porta
                const portaAberta = data.porta === true || data.porta === "aberta" || data.porta === "ABERTA";
                const doorTxt = document.getElementById('doorStatus');
                const doorCard = document.getElementById('cardPorta');
                const doorIcon = document.getElementById('doorIcon');
                
                doorTxt.textContent = portaAberta ? "ABERTA" : "FECHADA";
                doorTxt.style.color = portaAberta ? "#ff6b6b" : "#4ae3b5";
                
                if(portaAberta) {
                    doorCard.classList.add('alerta-critico');
                    doorIcon.className = "fas fa-door-open";
                    
                    // DISPARAR NOTIFICAÇÃO PUSH NO CELULAR
                    if (!jaNotificouPorta && Notification.permission === "granted") {
                        new Notification("Locus Defensus - ALERTA", {
                            body: "A porta do protótipo " + serial + " foi ABERTA!",
                            icon: "logo.sidebar.png"
                        });
                        jaNotificouPorta = true;
                    }
                } else {
                    doorCard.classList.remove('alerta-critico');
                    doorIcon.className = "fas fa-door-closed";
                    jaNotificouPorta = false; // Reseta para avisar na próxima abertura
                }
                
                // Status Atuadores
                document.getElementById('fanStatus').textContent = data.ventoinha ? "LIGADA" : "DESLIGADA";
                document.getElementById('fanStatus').style.color = data.ventoinha ? "#4ae3b5" : "#666";

                document.getElementById('buzzerStatus').textContent = data.buzzer ? "ATIVO" : "DESATIVADO";
                document.getElementById('buzzerStatus').style.color = data.buzzer ? "#ff6b6b" : "#666";
            }
        });
    }

    // Comandos de Controle (Firebase Set)
    document.getElementById('cardFan').onclick = () => {
        const atual = document.getElementById('fanStatus').textContent === "LIGADA";
        set(ref(db, `prototipos/${serialAtual}/ventoinha`), !atual);
    };

    document.getElementById('cardBuzzer').onclick = () => {
        const atual = document.getElementById('buzzerStatus').textContent === "ATIVO";
        set(ref(db, `prototipos/${serialAtual}/buzzer`), !atual);
    };

    function forceShow() {
        if(loader) loader.style.display = 'none';
        if(appEl) appEl.style.display = 'flex';
    }

    // Interações de Menu
    if(btnMenu) {
        btnMenu.onclick = (e) => {
            e.stopPropagation();
            sidebar.classList.toggle('active');
        };
    }

    document.addEventListener('click', (e) => {
        if (sidebar.classList.contains('active') && !sidebar.contains(e.target) && !btnMenu.contains(e.target)) {
            sidebar.classList.remove('active');
        }
    });

    document.getElementById('logoutBtn').onclick = () => {
        signOut(auth).then(() => window.location.replace("index.html"));
    };

    setTimeout(forceShow, 4000);
</script>
</body>
</html>
