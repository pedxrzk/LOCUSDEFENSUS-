<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locus Defensus - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Carregando dashboard...</p>
</div>

<div class="app" id="app" style="display: none;">

    <div class="sidebar">
        <div class="logo-card">
            <img src="logo.sidebar.png" alt="Logo" class="logo" onerror="this.style.display='none'">
        </div>

        <nav>
            <a href="dashboard.html" class="active">Dashboard</a>
            <a href="controle.html">Controle</a>
            <a href="historico.html">Histórico</a>
            <a href="quem.html">Quem Somos</a>
            <a href="sobre.html">Sobre</a>
        </nav>

        <button class="btn-danger" id="logoutBtn">Sair</button>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="main">

        <div class="topbar">
            <div style="display: flex; align-items: center;">
                <button class="menu-btn" onclick="toggleMenu()">☰</button>
                <h2>Dashboard</h2>
            </div>
            <p id="user" class="user-email"></p>
        </div>

        <div class="cards">
            <div class="card">
                <h3>🌡️ Temperatura</h3>
                <p>25.7°C</p>
            </div>

            <div class="card">
                <h3>💧 Umidade</h3>
                <p>55%</p>
            </div>

            <div class="card">
                <h3>📊 Pressão</h3>
                <p>Normal</p>
            </div>

            <div class="card">
                <h3>🔊 Buzzer</h3>
                <p>Desligado</p>
            </div>

            <div class="card">
                <h3>💡 LED</h3>
                <p>Ligado</p>
            </div>
        </div>

    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, onAuthStateChanged, signOut } from "firebase/auth";

    const firebaseConfig = {
        apiKey: "AIzaSyDbsCJu94nErqRYQM67BD9OR9lPVkieR4M",
        authDomain: "coleta-7fecd.firebaseapp.com",
        databaseURL: "https://coleta-7fecd-default-rtdb.firebaseio.com",
        projectId: "coleta-7fecd",
        storageBucket: "coleta-7fecd.firebasestorage.app",
        messagingSenderId: "130929270335",
        appId: "1:130929270335:web:8bcdad7cb048b1ec4fa28a",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loadingEl = document.getElementById('loading');
    const appEl = document.getElementById('app');
    const userEl = document.getElementById('user');
    const logoutBtn = document.getElementById('logoutBtn');

    // ✅ Função toggleMenu global para mobile
    window.toggleMenu = function() {
        const sidebar = document.querySelector(".sidebar");
        const overlay = document.querySelector(".overlay");
        sidebar.classList.toggle("active");
        overlay.classList.toggle("active");
    };

    // ✅ Logout
    const handleLogout = async () => {
        try {
            await signOut(auth);
            window.location.replace("index.html");
        } catch (error) {
            console.error("Erro ao sair:", error);
        }
    };

    if (logoutBtn) logoutBtn.onclick = handleLogout;

    // ✅ Monitor de Autenticação
    onAuthStateChanged(auth, (user) => {
        if (user) {
            // Usuário logado
            if (userEl) userEl.innerText = "👤 " + user.email;
            
            // TRANSISÇÃO: Esconde loading e mostra app como FLEX
            loadingEl.style.display = "none";
            appEl.style.display = "flex"; 
            
        } else {
            // Usuário não logado
            window.location.replace("index.html");
        }
    });
</script>

</body>
</html>
