<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - Locus Defensus</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
    <div class="spinner-circular"></div>
    <p>Carregando dashboard...</p>
</div>

<div class="app" id="app" style="display: none;">
    <button class="menu-toggle" id="menuToggle">☰ Menu</button>

   <nav class="sidebar" id="sidebar">
    <div class="logo-card"><img src="logo.sidebar.png" class="logo"></div>
    <a href="dashboard.html" class="active"><i class="fas fa-chart-line"></i> Dashboard</a>
    <a href="controle.html"><i class="fas fa-sliders"></i> Controle</a>
    <a href="historico.html"><i class="fas fa-clock-rotate-left"></i> Histórico</a>
    <a href="quem.html"><i class="fas fa-users"></i> Quem Somos</a>
    <a href="sobre.html"><i class="fas fa-circle-info"></i> Sobre</a>
    <div class="user-info-group">
        <p id="userSidebar"></p>
        <div class="divider"></div>
        <button id="logoutBtn" class="btn-danger">Sair</button>
    </div>
</nav>


    <main class="main">
    <header class="topbar">
        <h2>Painel Principal</h2>
        <p id="userTopbar" style="font-size: 12px; color: #666;"></p>
    </header>

    <div class="cards">
        <div class="card">
            <h3>🌡️ TEMPERATURA</h3>
            <p id="tempValue">25.7°C</p>
        </div>

        <div class="card">
            <h3>💧 UMIDADE</h3>
            <p id="humiValue">55%</p>
        </div>

        <div class="card">
            <h3>📊 PRESSÃO</h3>
            <p id="presValue">Normal</p>
        </div>

        <div class="card card-action" onclick="toggleBuzzer()">
            <h3>🔊 BUZZER</h3>
            <p id="buzzerStatus">Desligado</p>
        </div>

        <div class="card card-action" onclick="toggleLED()">
            <h3>💡 LED</h3>
            <p id="ledStatus">Ligado</p>
        </div>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDbsCJu94nErqRYQM67BD9OR9lPVkieR4M",
        authDomain: "coleta-7fecd.firebaseapp.com",
        databaseURL: "https://coleta-7fecd-default-rtdb.firebaseio.com",
        projectId: "coleta-7fecd",
        storageBucket: "coleta-7fecd.firebasestorage.app",
        messagingSenderId: "130929270335",
        appId: "1:130929270335:web:8bcdad7cb048b1ec4fa28a",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loader = document.getElementById('loadingOverlay');
    const appEl = document.getElementById('app');
    const sidebar = document.getElementById('sidebar');
    const btnMenu = document.getElementById('menuToggle');

    function forceShow() {
        if(loader) loader.style.display = 'none';
        if(appEl) appEl.style.display = 'flex';
    }

    // Lógica do Menu Mobile
    if(btnMenu) {
        btnMenu.onclick = (e) => {
            e.stopPropagation();
            sidebar.classList.toggle('active');
        };
    }

    // Fechar ao clicar fora ou em links
    document.addEventListener('click', (e) => {
        if (sidebar.classList.contains('active') && !sidebar.contains(e.target) && e.target !== btnMenu) {
            sidebar.classList.remove('active');
        }
    });

    onAuthStateChanged(auth, (user) => {
        if (user) {
            if(document.getElementById('userTopbar')) document.getElementById('userTopbar').textContent = user.email;
            if(document.getElementById('userSidebar')) document.getElementById('userSidebar').textContent = user.email;
            forceShow();
        } else {
            window.location.replace("index.html");
        }
    });

    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => window.location.replace("index.html"));
    
    setTimeout(forceShow, 3000); // Segurança

</script>
</body>
</html>
